 - name        : NCCL_LAZY_SETUP_CHANNELS
   type        : bool
   default     : false
   description : |-
     Enable lazily setup/initialize channel resources at runtime. Only minimal
     required number of channels will be required based on topology and collective
     operations and sizes used

 - name        : NCCL_MEM_USE_SLAB_ALLOCATOR
   type        : bool
   default     : false
   description : |-
      Use slab allocator to group small initChannel metadata calls to save GPU memory usage

 - name        : NCCL_FASTINIT_MODE
   type        : enum
   default     : none
   choices     : none, ring_hybrid
   description : |-
     FastInit supports various mode:
     - none: no FastInit, use baseline init
     - ring_hybrid: use ring based all-gather O(n) to initialize both baseline transport and ctran
     All optimizations (by meta) for Large Scale Jobs

 - name        : NCCL_SKIP_TCPFORM_RING
   type        : bool
   default     : false
   description : |-
    skip the formRingViaTcpStore() call in the bootstrap process when ncclCommInitRankScalable() is called.

 - name        : NCCL_USE_TRANSPORT_EXT
   type        : bool
   default     : false
   description : |-
     Toggle to enable the use of the Meta-developed extension for baseline transport-related functions.

 - name        : NCCL_CTRAN_ALLGATHER_MIN_SIZE
   type        : uint64_t
   default     : 4096
   description : |-
     Minimum size for ctran all gather.


 - name        : NCCL_CTRAN_NVL_ALLGATHERDIRECT_CHUNK_SIZE
   type        : int
   default     : 131072
   description : |-
    Number of bytes for each thread block to copy for intra-node all gather
    direct kernel. Number of thread blocks used for each collective is
    calculated by total bytes divided by chunk size.

 - name        : NCCL_CTRAN_NVL_ALLGATHERDIRECT_MAX_NUM_THREAD_BLOCKS
   type        : int
   default     : 32
   description : |-
     Maximum number of thread blocks used for intra-node allgather kernel. The
     value is calculated by NCCL_CTRAN_NVL_ALLGATHERDIRECT_CHUNK_SIZE and cannot
     exceed this number.

 - name        : NCCL_CTRAN_NVL_ALLGATHERDIRECT_THREAD_BLOCK_SIZE
   type        : int
   default     : 640
   description : |-
     Number of threads in each thread block used for intra-node
     allgatherdirect kernel.


 - name        : NCCL_CTRAN_AG_RING_MIN_SPLIT_SIZE
   type        : uint64_t
   default     : 65536
   description : |-
     Minimum message size to split in ring AllGather algorithm. Messages larger
     than this will be split equally into NCCL_CTRAN_AG_RING_NUM_SPLIT messages.

 - name        : NCCL_CTRAN_AG_RING_NUM_SPLIT
   type        : int
   default     : 2
   description : |-
     Split messages larger than NCCL_CTRAN_AG_RING_MIN_SPLIT_SIZE into this many
     messages.

 - name        : NCCL_CTRAN_HIER_AG_IB_NUM_BLOCKS
   type        : int
   default     : 16
   description : |-
     Number of CUDA thread blocks for the cthierarchical_ring AllGather IB
     ring phase. For 4x1 IB-only tests, this is the full hierarchical kernel
     grid size because the NVLink fanout degenerates to nvl_size=1.

 - name        : NCCL_CTRAN_HIER_AG_OVERLAP_ENABLE
   type        : bool
   default     : false
   description : |-
     Enable the experimental overlapped cthierarchical_ring AllGather kernel.
     When enabled, dedicated IB blocks publish chunk-ready counters and
     dedicated NVLink blocks fan out chunks as soon as they arrive.

 - name        : NCCL_CTRAN_HIER_AG_OVERLAP_CHUNK_BYTES
   type        : uint64_t
   default     : 0
   description : |-
     Override for the logical chunk size, in bytes, used by the experimental
     overlapped cthierarchical_ring AllGather kernel for IB-ready notification
     and NVLink fanout scheduling. When zero, ctran selects a chunk size from
     {512KiB, 1MiB, 2MiB, 4MiB, 8MiB} based on the send message size.

 - name        : NCCL_CTRAN_HIER_AG_IBGDA_DATA_BUFFER_SIZE
   type        : uint64_t
   default     : 33554432
   description : |-
     Minimum IBGDA send/recv data-buffer size to use when the experimental
     overlapped cthierarchical_ring AllGather kernel is enabled. 0 disables
     this algorithm-specific minimum and uses NCCL_CTRAN_IBGDA_DATA_BUFFER_SIZE
     or the per-communicator pipesIbgdaDataBufferSize directly.

 - name        : NCCL_CTRAN_HIER_AG_NVL_SHARED_DEVBUF_SIZE
   type        : uint64_t
   default     : 67108864
   description : |-
     Minimum total per-peer NVLink shared device-buffer size to use when the
     experimental overlapped cthierarchical_ring AllGather kernel is enabled.
     This value is divided by NCCL_CTRAN_P2P_NVL_COPY_PIPELINE_DEPTH before
     configuring each pipeline slot. 0 disables this algorithm-specific
     minimum and uses NCCL_CTRAN_P2P_NVL_SHARED_DEVBUF_SIZE directly.

 - name        : NCCL_CTRAN_HIER_AG_IB_QPS_PER_PEER_PER_NIC
   type        : int
   default     : 4
   description : |-
     Number of IBGDA QP sets per peer per NIC for the cthierarchical_ring
     AllGather algorithm.

 - name        : NCCL_CTRAN_HIER_AG_IB_SIGNAL_BYTES
   type        : uint64_t
   default     : 0
   description : |-
     Maximum bytes per signaled sub-chunk for the cthierarchical_ring IBGDA
     send/recv phase. 0 means each block signals once per per-block staging
     slot.

 - name        : NCCL_CTRAN_HIER_AG_NVL_SIGNAL_BYTES
   type        : uint64_t
   default     : 0
   description : |-
     Maximum bytes per signaled sub-chunk for the cthierarchical_ring NVLink
     fanout phase. 0 means each block signals once per per-block staging slot.

 - name        : NCCL_CTRAN_HIER_AG_TIMEOUT_MS
   type        : float
   default     : 30000.0
   description : |-
     Timeout in milliseconds for the cthierarchical_ring AllGather kernel.
     0 means no timeout.


 - name        : NCCL_CTRAN_ALLREDUCE_DIRECT_MAX_NUM_THREAD_BLOCKS
   type        : int
   default     : 32
   description : |-
     Maximum number of thread blocks used for the AllReduce kernel.
     We might use fewer thread blocks, if we can achieve max occupancy
     with them.

 - name        : NCCL_CTRAN_ALLREDUCE_DIRECT_THREAD_BLOCK_SIZE
   type        : int
   default     : -1
   description : |-
     Number of threads in each thread block used for the AllReduce
     kernel. Default -1 to use the recommended size by CUDA runtime.

 - name        : NCCL_CTRAN_ALLREDUCE_ARG_MAX_NUM_THREAD_BLOCKS
   type        : int
   default     : 32
   description : |-
     Maximum number of thread blocks used for the AllReduce kernel.
     We might use fewer thread blocks, if we can achieve max occupancy
     with them.

 - name        : NCCL_CTRAN_ALLREDUCE_ARG_THREAD_BLOCK_SIZE
   type        : int
   default     : -1
   description : |-
     Number of threads in each thread block used for the AllReduce
     kernel. Default -1 to use the recommended size by CUDA runtime.

 - name        : NCCL_CTRAN_ALLTOALL_NUM_THREAD_BLOCKS
   type        : int
   default     : -1
   description : |-
     Number of thread blocks to use for AllToAll.
     Setting it to a negative number means that NCCL will automatically
     pick a value.

 - name        : NCCL_CTRAN_ALLTOALL_THREAD_BLOCK_SIZE
   type        : int
   default     : 256
   description : |-
     Number of threads in each thread block to use for AllToAll.
     Setting it to a negative number means that NCCL will automatically
     pick a value.

 - name        : NCCL_CTRAN_ALLTOALL_THRESHOLD
   type        : uint64_t
   default     : 32768
   description : |-
     Minimal message size in bytes to send to (receive from) each rank to use
     CTran AllToAll. Messages smaller than the threshold may benefit from
     the default eager copy based algorithm.

 - name        : NCCL_CTRAN_COMPRESSED_ALLTOALLV_CHUNK_SIZE
   type        : uint64_t
   default     : 16777216
   description : |-
     The size of the temporary chunk used in the compressedAllToAllv to store
     compressed buffer size. Setting it allows compressedAllToAllv to prevent
     bootstraping compressed buffer sizes to reduce latency. It is set to 16MB
     by default as it's the largest single chunk size acceptable by nvcomp.

 - name        : NCCL_CTRAN_COMPRESSED_ENABLE_LOGGING
   type        : bool
   default     : false
   description : |-
     Whether to log the compression ratio of each message in the compressed collectives.

 - name        : NCCL_CTRAN_ALLTOALLV_NUM_THREAD_BLOCKS
   type        : int
   default     : 64
   description : |-
     Number of thread blocks used for intra-node AllToAllv kernel.
     Must be even number.

 - name        : NCCL_CTRAN_ALLTOALLV_THREAD_BLOCK_SIZE
   type        : int
   default     : 256
   description : |-
     Number of threads in each thread block used for intra-node
     AllToAllv kernel.

 - name        : NCCL_CTRAN_ALLTOALLV_DEDUP_SEND_NUM_THREAD_BLOCK_GROUPS
   type        : int
   default     : 1
   description : |-
     Number of thread block groups used for copying send data within the
     AllToAllvDedup kernel.

 - name        : NCCL_CTRAN_ALLTOALLV_DEDUP_SEND_NUM_THREAD_BLOCKS_PER_GROUP
   type        : int
   default     : 1
   description : |-
     Number of thread blocks in sendCopy group for sending data within the
     AllToAllvDedup kernel.

 - name        : NCCL_CTRAN_ALLTOALLV_DEDUP_FWD_NUM_THREAD_BLOCKS
   type        : int
   default     : 1
   description : |-
     Number of thread blocks in forward group for forwarding data within the
     AllToAllvDedup kernel.


 - name        : NCCL_CTRAN_ALLTOALLV_DEDUP_INTRA_FWD_NUM_THREAD_BLOCKS
   type        : int
   default     : 1
   description : |-
     Number of thread blocks in intra forward group for forwarding data within the
     AllToAllvDedup kernel.

 - name        : NCCL_CTRAN_ALLTOALLV_DEDUP_RECV_NUM_THREAD_BLOCK_GROUPS
   type        : int
   default     : 1
   description : |-
     Number of thread block groups used for copying received data within
     the AllToAllvDedup kernel.

 - name        : NCCL_CTRAN_ALLTOALLV_DEDUP_RECV_NUM_THREAD_BLOCKS_PER_GROUP
   type        : int
   default     : 1
   description : |-
     Number of thread blocks in recvCopy group for copying data within the
     AllToAllvDedup kernel.

 - name        : NCCL_CTRAN_ALLTOALLV_DEDUP_INTRA_RECV_NUM_THREAD_BLOCKS
   type        : int
   default     : 1
   description : |-
     Number of thread blocks in intra recvCopy group for forwarding data within the
     AllToAllvDedup kernel from the same node.

 - name        : NCCL_CTRAN_ALLTOALLV_DEDUP_THREAD_BLOCK_SIZE
   type        : int
   default     : 256
   description : |-
     Number of threads in each thread block used for AllToAllvDedup kernel.

 - name        : NCCL_CTRAN_ALLTOALLV_DEDUP_RESET_THREAD_BLOCK_SIZE
   type        : int
   default     : 256
   description : |-
     Number of threads in each thread block used for the reset kernel
     in AllToAllvDedup.

 - name        : NCCL_CTRAN_ALLTOALLV_DEDUP_NUM_CHUNKS
   type        : int
   default     : 4
   description : |-
     Number of temporary chunks used in the AllToAllvDedupDP internal
     pipeline.

 - name        : NCCL_CTRAN_ALLTOALLV_DEDUP_CHUNK_SIZE
   type        : int
   default     : 16777216
   description : |-
     Number of temporary chunk size in bytes used in the AllToAllvDedupDP
     internal pipeline.

 - name        : NCCL_CTRAN_NVL_BROADCAST_CHUNK_SIZE
   type        : int
   default     : 131072
   description : |-
    Number of bytes for each thread block to copy for intra-node broadcast
    kernel. Number of thread blocks used for each collective is calculated
    by total bytes divided by chunk size.

 - name        : NCCL_CTRAN_NVL_BROADCAST_MAX_NUM_THREAD_BLOCKS
   type        : int
   default     : 32
   description : |-
     Maximum number of thread blocks used for intra-node broadcast kernel. The
     number of thread blocks calculated by NCCL_CTRAN_NVL_BROADCAST_CHUNK_SIZE
     cannot exceed this number.

 - name        : NCCL_CTRAN_NVL_BROADCAST_THREAD_BLOCK_SIZE
   type        : int
   default     : -1
   description : |-
     Number of threads in each thread block used for intra-node
     broadcast kernel. Default -1 to use the recommended size by CUDA runtime.


 - name        : NCCL_CTRAN_REDUCESCATTER_REDUCE_NELEM_PER_THREAD_BLOCK
   type        : int
   default     : 131072
   description : |-
    Number of elements for each thread block to handle the local reduce
    operation. Number of thread blocks used for each collective is calculated
    by total number of elements and number of local ranks divided by chunk size.

 - name        : NCCL_CTRAN_REDUCESCATTER_THREAD_BLOCK_SIZE
   type        : int
   default     : 640
   description : |-
     Number of threads in each thread block used for the local reduce
     kernel. Set to -1 to use the recommended size by CUDA runtime.


 - name        : NCCL_CTRAN_REDUCESCATTER_DIRECT_MAX_NUM_THREAD_BLOCKS
   type        : int
   default     : 32
   description : |-
     Maximum number of thread blocks used for intra-node reducescatter kernel.
     The number of thread blocks calculated by
     NCCL_CTRAN_REDUCESCATTER_REDUCE_NELEM_PER_THREAD_BLOCK cannot exceed this
     number.

 - name        : NCCL_CTRAN_REDUCESCATTER_DIRECT_MIN_SIZE
   type        : uint64_t
   default     : 33554432
   description : |-
     Minimum recvbytes for direct zero-copy reducescatter. If recvbytes is
     smaller than the threshold, we will use stage copy to copy the data from
     sendbuff to a pre-allocated and IPC shared tmpBuf. It avoids overhead from
     GPE-kernel sync and ctrl msg exchange, which can be more expensive than D2D
     copy. Note: it must not exceed NCCL_CTRAN_BCAST_NVL_SHARED_DEVBUF_SIZE /
     number of ranks.

 - name        : NCCL_CTRAN_REDUCESCATTER_RHD_MAX_NUM_THREAD_BLOCKS
   type        : int
   default     : 4
   description : |-
     Maximum number of thread blocks used for inter-rank-only reducescatter
     kernel. The number of thread blocks calculated by
     NCCL_CTRAN_REDUCESCATTER_REDUCE_NELEM_PER_THREAD_BLOCK cannot exceed this
     number.

 - name        : NCCL_CTRAN_NVL_SENDRECV_CHUNK_SIZE
   type        : int
   default     : 131072
   description : |-
    Number of bytes for each thread block to copy for intra-node sendrecv
    kernel. Number of thread blocks used for each collective is calculated
    by total bytes divided by chunk size.

 - name        : NCCL_CTRAN_NVL_SENDRECV_MAX_NUM_THREAD_BLOCKS
   type        : int
   default     : 32
   description : |-
     Maximum number of thread blocks used for intra-node sendrecv kernel. The
     number of thread blocks calculated by NCCL_CTRAN_NVL_SENDRECV_CHUNK_SIZE
     cannot exceed this number.

 - name        : NCCL_CTRAN_NVL_SENDRECV_ZCOPY_THREAD_BLOCK_SIZE
   type        : int
   default     : -1
   description : |-
     Number of threads in each thread block used for intra-node zero-copy
     sendrecv kernel. Default -1 to use the recommended size by CUDA runtime

 - name        : NCCL_CTRAN_NVL_SENDRECV_P2P_THREAD_BLOCK_SIZE
   type        : int
   default     : 512
   description : |-
     Number of threads in each thread block used for intra-node p2p
     sendrecv kernel.

 - name        : NCCL_CTRAN_REDUCESCATTER_RING_MAX_NUM_THREAD_BLOCKS
   type        : int
   default     : 4
   description : |-
     Maximum number of thread blocks used for inter-rank-only reducescatter
     kernel. The number of thread blocks calculated by
     NCCL_CTRAN_REDUCESCATTER_REDUCE_NELEM_PER_THREAD_BLOCK cannot exceed this
     number.

 - name        : NCCL_CTRAN_P2P_NVL_SHARED_DEVBUF_SIZE
   type        : uint64_t
   default     : 8388608
   description : |-
    A group of shared device memory region, each with the specified size
    allocated for NVLink inter-GPU staged communication. A contiguous memory
    region with NCCL_CTRAN_P2P_NVL_SHARED_DEVBUF_SIZE * (number of local ranks -
    1) size will be allocated on each rank, and IPC shared with all the other
    NVLink peers. It is divided into (number of local ranks - 1) chunks and
    each is used with a dedicated NVLink peer. It serves as a bi-directional
    point-to-point staged data copy channel between every two peers.


 - name        : CTRAN_P2P_NVL_DEVMEM_MAX_CHUNKS
   type        : uint64_t
   default     : 128
   description : |-
     Maximum chunks of a staging buffer in P2P NVL copy-based kernel. The value
     = 16M/128k (maximum staging buffer / minimum chunk size). Currently unused
     after the cooperative chunk-state path was removed.

 - name        : NCCL_CTRAN_P2P_NVL_COPY_PIPELINE_DEPTH
   type        : size_t
   default     : 2
   description : |-
     Pipeline depth for NVL P2P copy-based kernel. This value controls the
     number of pipeline stages used for data transfer operations between
     NVLink peers.

 - name        : NCCL_CTRAN_P2P_HOST_IB_PIPELINE_DEPTH
   type        : int
   default     : 8
   description : |-
     Pipeline depth for the host-side IB copy-based P2P transport
     (HostCbTransport). This controls the number of in-flight staging slots
     per peer. Must not exceed ctran::transport::ib::kMaxPipelineDepth
     (defined in comms/ctran/transport/ib/HostCbTransport.h). Default matches
     kMaxPipelineDepth.

 - name        : NCCL_CTRAN_P2P_HOST_IB_CHUNK_SIZE
   type        : size_t
   default     : 524288
   description : |-
     Per-chunk staging-buffer size in bytes for the host-side IB copy-based
     P2P transport (HostCbTransport). Each of the pipelineDepth staging
     slots is this size on both send and recv sides. Default is 512 KiB.

 - name        : NCCL_CTRAN_BCAST_NVL_SHARED_DEVBUF_SIZE
   type        : uint64_t
   default     : 33554432
   description : |-
     A single shared device memory region with the specified size allocated on
     each rank for inter-GPU staged communication. It is used for each rank to
     share its own data with all the other peers, similar to a bcast or incast
     pattern.

 - name        : NCCL_CTRAN_IB_DMABUF_ENABLE
   type        : bool
   default     : true
   description : |-
     Enable use of ib_reg_dmabuf_mr for ib

 - name        : NCCL_CTRAN_REGISTRATION_SIZE_CHECK
   type        : bool
   default     : false
   description : |-
     This is to disable check for registration size for less than page size.
     Page size on aarch64 is 64K.

 - name        : NCCL_CTRAN_IB_ASYNC_EVENT_POLL_INTERVAL_MS
   type        : int
   default     : 10
   description : |-
     How often to poll for an IB async event in milliseconds.

 - name        : NCCL_CTRAN_IB_EPOCH_LOCK_ENABLE
   type        : bool
   default     : true
   description : |-
     Enable epoch lock for ctran IB backend. This is to avoid per-object lock in
     ctran IB backend. We recommend it to be always enabled unless for
     performance debugging of per-object lock. Setting it to true requires all
     code using CtranIb to explicitly call epochLock() and epochUnlock();
     otherwise, it would be invalid usage. Setting to false would disable the
     epoch lock even if epochLock() and epochUnlock() are called.

 - name        : NCCL_CTRAN_IB_EPOCH_LOCK_ENFORCE_CHECK
   type        : bool
   default     : false
   description : |-
     Enforce the check for epoch lock when NCCL_CTRAN_IB_EPOCH_LOCK_ENABLE is
     true. It is for testing only, and would add additional cost in ctranIb
     critical path.

 - name        : NCCL_CTRAN_IB_MAX_QPS
   type        : int
   default     : 16
   description : |-
     Maximum number of QPs to enable, so data can be split across
     multiple QPs.  This allows the communication to take multiple routes
     and is a poor-man's version of fully adaptive routing.

 - name        : NCCL_CTRAN_IB_NUM_VCS_PER_RANK
   type        : int
   default     : 1
   description : |-
     Number of per-peer VCs (CtranIbVirtualConn) returned by
     CtranIb::getVcs(peerRank). Each VC is pinned to a single NIC and
     owns its own ctrl/notify/atomic + data QPs. The data QPs are
     derived as NCCL_CTRAN_IB_MAX_QPS / NCCL_CTRAN_IB_NUM_VCS_PER_PEER
     per VC, distributed across NICs by
     NCCL_CTRAN_IB_NUM_VCS_PER_PEER / NCCL_CTRAN_IB_DEVICES_PER_RANK
     VCs per NIC. Used by callers that obtain VCs via
     CtranIb::getVcs(peerRank).

 - name        : NCCL_CTRAN_IB_QP_SCALING_THRESHOLD
   type        : uint64_t
   default     : 524288
   description : |-
     Messages of size min(NCCL_CTRAN_IB_QP_SCALING_THRESHOLD, remainingData)
     will be sent round-robin on the available queue pairs until a put is
     complete or until NCCL_CTRAN_IB_QP_MAX_MSGS are outstanding on each QP.
     If set to 0, iputs will be split equally across QPs.

 - name        : NCCL_CTRAN_IB_QP_MAX_MSGS
   type        : uint64_t
   default     : 128
   description : |-
     Maximum number of outstanding messages per QP at a given time. As messages
     complete and CQEs are generated, new messages will be posted to keep the
     send queue full of this many WQEs.

 - name        : NCCL_CTRAN_IB_QP_INTERLEAVE_DEVICES_ENABLE
   type        : bool
   default     : True
   description : |-
     When a VC spans multiple NICs (NCCL_CTRAN_IB_DEVICES_PER_RANK > 1 with a
     single VC striped across them), distribute a single put/get's QP-scaling
     sub-chunks round-robin across all NICs first (interleaved visit order
     qp0, qpK, qp2K, ... advancing the device before the next QP on a device,
     where K = MAX_QPS / devices, instead of filling one NIC's qp0..K-1 before
     the next). This lets a put smaller than
     NCCL_CTRAN_IB_QP_SCALING_THRESHOLD * (MAX_QPS / devices) still drive all
     NICs, capturing the multi-NIC bandwidth without extra QP or channel setup.
     No effect when the VC is bound to a single NIC (the mapping is the
     identity).

 - name        : NCCL_CTRAN_IB_QP_INTERLEAVE_MIN_WQE_SIZE
   type        : uint64_t
   default     : 65536
   description : |-
     Minimum per-WQE size (bytes) for NCCL_CTRAN_IB_QP_INTERLEAVE_DEVICES_ENABLE
     to take effect. A single op's WQEs are interleaved across NICs only when
     each WQE exceeds this size. WQEs at or below it (e.g. the 64K pieces a
     NUM_SPLIT=2 AllGather ring produces from a 128K per-rank chunk) are
     latency-bound -- one NIC handles them fine and spreading them across NICs
     only adds cross-NIC ordering/straggler cost, so interleaving is skipped.

 - name        : NCCL_CTRAN_IB_MAX_NUM_CQE
   type        : int
   default     : -1
   description : |-
     Maximum number of Completion Queue Entries (CQEs). When set to a
     positive value, caps the CQ size to reduce memory overhead. ConnectX
     NICs report max_cqe ~4M which causes the driver to allocate ~256MB
     per CQ. For example, setting to 32768 keeps per-CQ memory at ~2MB.
     Default -1 to use the device-reported maximum.

 - name        : NCCL_CTRAN_NET_FORCE_FLUSH
   type        : int
   default     : 0
   description : |-
     Enable PCIe flush support (RDMA READ) for CTRAN network receives. On
     platforms where the NIC-PCIe-GPU topology does not guarantee immediate
     GPU visibility for DMA writes, the flush drains pending writes before
     received data is forwarded or read by GPU copy engines/kernels.

 - name        : NCCL_CTRAN_IB_DEVICES_PER_RANK
   type        : int
   default     : 1
   description : |-
     Number of IB devices/NIC to use per rank. By default, we use only one IB device

 - name        : NCCL_CTRAN_IB_DEVICE_STRIDE
   type        : int
   default     : 1
   description : |-
    The stride determines how NICs are selected for each rank. By default, NICs are chosen sequentially. On GB200 hosts, there are 4 NICs distributed across two separate planes, so ranks must select NICs with a stride of 2 to avoid cross-plane hangs. For example, rank 0 chooses NIC 0, and rank 1 chooses NIC 2 (skipping NIC 1). On GB200 platforms, either NCCL_CTRAN_IB_DEVICES_PER_RANK or NCCL_CTRAN_IB_DEVICE_STRIDE must be set to 2 to ensure proper NIC selection.


 - name        : NCCL_CTRAN_IB_CTRL_TC
   type        : uint64_t
   default     : 224
   description : |-
     Traffic class to use for control QPs. Note: To match NCCL_IB_TC, this
     directly sets the TC field, so multiply your DSCP value by 4.

 - name        : NCCL_CTRAN_IB_VC_MODE
   type        : enum
   default     : dqplb
   choices     : spray, dqplb
   description : |-
     Configure IBVCs to support either spray mode (uses extra QP for
     notifications) or dqplb mode ("normal" but all writes are WRITE_WITH_IMM)

 - name        : NCCL_CTRAN_IB_QP_CONFIG_XZONE
   type        : stringlist
   default     : "1048576,16,spray,128"
   description : |-
     A set of configuration for CTRAN IB over inter-zone communication:
     <QP_SCALING_THRESHOLD>,<MAX_QPS>,<VC_MODE>,<QP_MAX_MSGS>
     e.g., NCCL_CTRAN_IB_QP_CONFIG_XZONE="1048576,4,spray,6"
     If not given, NCCLx will use values from
     NCCL_CTRAN_IB_QP_SCALING_THRESHOLD, NCCL_CTRAN_IB_MAX_QPS,
     NCCL_CTRAN_IB_VC_MODE, and NCCL_CTRAN_IB_QP_MAX_MSGS respectively

 - name        : NCCL_CTRAN_IB_QP_CONFIG_XDC
   type        : stringlist
   default     : "1048576,16,spray,128"
   description : |-
     A set of configuration for CTRAN IB over inter-DC communication:
     <QP_SCALING_THRESHOLD>,<MAX_QPS>,<VC_MODE>,<QP_MAX_MSGS>
     e.g., NCCL_CTRAN_IB_QP_CONFIG_XDC="1048576,4,spray,6"
     If not given, NCCLx will use values from
     NCCL_CTRAN_IB_QP_SCALING_THRESHOLD, NCCL_CTRAN_IB_MAX_QPS,
     NCCL_CTRAN_IB_VC_MODE, and NCCL_CTRAN_IB_QP_MAX_MSGS respectively

 - name        : NCCL_CTRAN_IB_PG_TRAFFIC_CLASS
   type        : stringlist
   default     :
   description : |-
     Specify the traffic class for each PG. The format is
     <PG_0: VAL0>,<PG_1: VAL1>,<PG_2: VAL2>,<PG_3: VAL3>
     e.g., NCCL_CTRAN_IB_PG_TRAFFIC_CLASS="PP_P2P_0:200,PP_P2P_1:208,DP:212"
     If not given, NCCLx will use default traffic class 224 for all PGs

 - name        : NCCL_CTRAN_IB_QP_CONFIG_ALGO
   type        : dictlist
   default     : alltoall:1048576,16,dqplb,128,224
   description : |-
     Specify the vc config for each collective. The format is
     <ALGO0: VAL0>,<ALGO1: VAL1>,<ALGO2: VAL2>,<ALGO3: VAL3>
     where value is a list of <QP_SCALING_THRESHOLD>,<MAX_QPS>,<VC_MODE>,<QP_MAX_MSGS><TRAFFIC_CLASS>
     e.g., NCCL_CTRAN_IB_QP_CONFIG_ALGO="alltoall:1048576,4,dqplb,128,224;sendrecv:1048576,16,spray,128,224"
     If not given, NCCLx will use the configuration specified per topology
     (see NCCL_CTRAN_IB_QP_CONFIG_XDC, NCCL_CTRAN_IB_QP_CONFIG_XZONE),
     or the default configuration set (see NCCL_CTRAN_IB_QP_SCALING_THRESHOLD, NCCL_CTRAN_IB_MAX_QPS,
     NCCL_CTRAN_IB_VC_MODE, and NCCL_CTRAN_IB_QP_MAX_MSGS) for all collectives.

 - name        : NCCL_CTRAN_EX_IB_QP_CONFIG
   type        : stringlist
   default     :
   description : |-
     A set of configuration for CTRAN_EX IB communication. e.g FTAR:
     <QP_SCALING_THRESHOLD>,<MAX_QPS>,<VC_MODE>,<QP_MAX_MSGS>
     e.g., NCCL_CTRAN_EX_IB_QP_CONFIG="1048576,16,spray,128"
     If not given, NCCLx will use values from
     NCCL_CTRAN_IB_QP_SCALING_THRESHOLD, NCCL_CTRAN_IB_MAX_QPS,
     NCCL_CTRAN_IB_VC_MODE, and NCCL_CTRAN_IB_QP_MAX_MSGS respectively

 - name        : NCCL_CTRAN_NUM_KERNEL_ELEMS
   type        : int
   default     : 65536
   description : |-
     Size of kernel p2p elements pre-allocated for each communicator.
     Used to pass variable number of p2p operations to the kernel.
     Each p2p element is allocated from page-locked memory on the host.

 - name        : NCCL_CTRAN_NUM_KERNEL_FLAGS
   type        : int
   default     : 8192
   description : |-
     Size of kernel flags pre-allocated for each communicator.
     Used to pass one kernel flag to the kernel.
     Each flag is allocated from page-locked memory on the host.

 - name        : NCCL_CTRAN_NUM_CHECKSUMS
   type        : int
   default     : 8192
   description : |-
     Size of checksums pre-allocated for each communicator.
     Each checksum is allocated from page-locked memory on the host.

 - name        : NCCL_CTRAN_NUM_GPE_KERNEL_SYNCS
   type        : int
   default     : 1024
   description : |-
     Size of GpeKernelSync structs pre-allocated for each communicator.
     Each GpeKernelSync is allocated from page-locked memory on the host.

 - name        : NCCL_CTRAN_ABORT_ON_ERROR
   type        : bool
   default     : false
   description : |-
     When there is an error, abort directly, instead of setting the
     async flag.


 - name        : NCCL_CTRAN_PROFILING
   type        : enum
   default     : none
   choices     : none, stdout, info, kineto
   description : |-
     Kind of ctran profiling needed.
     none - No profiling
     stdout - Dump profiling data to stdout
     info   - Dump profiling data to NCCL_DEBUG INFO
     kineto - Dump profiling data to a kineto log
        (for kineto profiling, see also NCCL_CTRAN_KINETO_PROFILE_DIR)

 - name        : NCCL_CTRAN_KINETO_PROFILE_DIR
   type        : string
   default     : "/tmp"
   description : |-
     Directory to place Ctran kineto profiling logs. Support both local
     directory path or FB internal remote path.
     (see also NCCL_CTRAN_PROFILING)

 - name        : NCCL_CTRAN_REGISTER
   type        : enum
   default     : async
   choices     : none, lazy, eager, async
   description : |-
     Kind of registration to use for ctran user buffers
     none - No registration
     lazy - Lazy registration (keep track of user-provided registration
            buffers, but delay the actual registration till the buffer
            is used for a communication operation)
     eager - Eager registration (register buffers as soon as it is
             provided by the user)
     async - Asynchronous registration (in addition to lazy registration,
             register buffers asynchronously by a background thread at
             communication operation). When schedule a communication operation,
             if buffer is not registered and smaller than available internal
             pre-registered buffer (see NCCL_CTRAN_INTERNODE_TMPBUF_SIZE), the
             communication will be stagging copied via the internal buffer while
             the registration is handled by a background thread.

 - name        : NCCL_CTRAN_REGISTER_ERROR_ON_DYNAMIC
   type        : bool
   default     : false
   description : |-
     Fails at collective scheduling time if the buffer is not pre-registered by user.

 - name        : NCCL_CTRAN_USE_PIPES
   type        : bool
   default     : false
   description : |-
     Enable Pipes MultiPeerTransport for Ctran. When enabled, Ctran will
     initialize MultiPeerTransport which provides unified NVLink and IBGDA
     transport for P2P communication.

 - name        : NCCL_CTRAN_MAX_NBLOCKS
   type        : int
   default     : 16
   description : |-
     Maximum number of logical CUDA blocks used by CTRAN collectives that support message-size-based block tuning.

 - name        : NCCL_CTRAN_TREE_FANOUT
   type        : int
   default     : 2
   description : |-
     Fanout used when building CTREE tree topologies for experimental benchmarking.
     Valid values are 1 through the compile-time maximum tree children.

 - name        : NCCL_CTRAN_PIPES_TRACE_ENABLE
   type        : bool
   default     : false
   description : |-
     Enable generic Pipes algorithm tracing. When enabled, CTA leaders write
     compact per-phase events to an HRDW ring buffer and a host background
     thread polls the buffer on an interval, so breadcrumbs are logged while
     the kernel is still running (including when it hangs).

 - name        : NCCL_CTRAN_PIPES_TRACE_RING_SIZE
   type        : uint64_t
   default     : 1048576
   description : |-
     Number of HRDW ring-buffer entries reserved per communicator for
     NCCL_CTRAN_PIPES_TRACE_ENABLE.

 - name        : NCCL_CTRAN_PIPES_TRACE_POLL_INTERVAL_MS
   type        : uint64_t
   default     : 50
   description : |-
     Interval in milliseconds at which the host background thread polls the
     HRDW ring buffer for NCCL_CTRAN_PIPES_TRACE_ENABLE. Smaller values reduce
     the chance of losing events to ring wraparound on high-rate kernels at the
     cost of more frequent polling; a final drain always runs on teardown.

 - name        : NCCL_CTRAN_PIPES_NVL_CHUNK_SIZE
   type        : uint64_t
   default     : 524288
   description : |-
     Chunk size in bytes for NVL transport in Pipes MultiPeerTransport.
     Controls the granularity of parallel copy operations over NVLink.

 - name        : NCCL_CTRAN_PIPES_DISABLE_IB
   type        : bool
   default     : false
   description : |-
     Disable IBGDA transport in Pipes MultiPeerTransport. When set to true,
     IBGDA transport is never constructed and all non-self peers are assumed
     to be NVL-connected. All data movement and sync operations go over
     NVLink. Requires that all ranks are in the same NVL domain.

 - name        : NCCL_CTRAN_PIPES_IB_MODE
   type        : enum
   default     : ibgda
   choices     : ibgda, ibrc
   description : |-
     Select the IB backend used by Pipes MultiPeerTransport for non-NVL peers.
     ibgda - use GPU-posted IBGDA.
     ibrc - use CPU-posted IBRC.

 - name        : NCCL_CTRAN_IBGDA_QP_DEPTH
   type        : uint64_t
   default     : 1024
   description : |-
     Queue pair depth (number of outstanding WQEs per peer) for IBGDA
     transport in Pipes MultiPeerTransport. Must be >= the largest
     ThreadGroup size used in group-scope put operations (e.g., 256 for
     block-scope). Higher values allow more pipelining but use more
     memory.

 - name        : NCCL_CTRAN_IB_MAX_GROUPS
   type        : int
   default     : 64
   description : |-
     Maximum number of physical CUDA block groups that may own IB QP
     resources. Device-side IB QP selection uses ThreadGroup::block_id
     and requires block_id < NCCL_CTRAN_IB_MAX_GROUPS.

 - name        : NCCL_CTRAN_IB_QPS_PER_BLOCK_PER_NIC
   type        : int
   default     : 1
   description : |-
     Number of main IB QPs owned by each physical CUDA block on each NIC.
     Puts from a block round-robin across its NIC-first QP lanes.

 - name        : NCCL_CTRAN_IBGDA_SIGNAL_COUNT
   type        : uint64_t
   default     : 1
   description : |-
     Number of signal slots per peer for IBGDA transport in Pipes
     MultiPeerTransport. Each slot is a 64-bit counter used for
     signaling between peers.

 - name        : NCCL_CTRAN_IBGDA_DATA_BUFFER_SIZE
   type        : uint64_t
   default     : 0
   description : |-
     Per-peer data buffer size in bytes for IBGDA transport in Pipes
     MultiPeerTransport. This determines the maximum transfer size per
     put_signal call. A value of 0 means no transport-managed data
     buffer (users must register their own via registerBuffer).

 - name        : NCCL_CTRAN_IBGDA_MIN_RNR_TIMER
   type        : uint64_t
   default     : 12
   description : |-
     Minimum RNR NAK Timer field value for IBGDA transport in Pipes
     MultiPeerTransport. Controls the delay before a receiver sends
     a RNR NAK. See InfiniBand specification Volume 1, Table 46.

 - name        : NCCL_CTRAN_IBGDA_RNR_RETRY
   type        : uint64_t
   default     : 7
   description : |-
     RNR retry count for IBGDA transport in Pipes MultiPeerTransport.
     Number of times to retry after receiving an RNR NAK.
     7 means infinite retry.

 - name        : NCCL_CTRAN_IBGDA_LAZY_CONNECT
   type        : bool
   default     : false
   description : |-
     When true, MultipeerIbgdaTransport defers per-peer state allocation to
     first use (lazy mode). When false (default), all per-peer state is
     allocated eagerly at construction. Per-comm override via
     CommOptions.hints["ncclx::ibLazyConnect"].

 - name        : NCCL_CTRAN_IBGDA_MATERIALIZE_PEER_TIMEOUT_MS
   type        : uint32_t
   default     : 30000
   description : |-
     Timeout (in milliseconds) for materializePeer bilateral exchange.
     On timeout, materializePeer throws rather than hanging.
     No per-comm override.

 - name        : NCCL_CTRAN_IBGDA_SENDRECV_ENABLE
   type        : bool
   default     : false
   description : |-
     Enable send/recv staging buffers for IBGDA transport in Pipes
     MultiPeerTransport. Required for cthierarchical_ring. When enabled,
     allocates additional GPU memory for pipelined send/recv staging per
     IBGDA peer. The effective IBGDA data-buffer size must be positive via
     NCCL_CTRAN_IBGDA_DATA_BUFFER_SIZE or the per-communicator
     pipesIbgdaDataBufferSize hint.

 - name        : NCCL_CTRAN_IBGDA_SENDRECV_PIPELINE_DEPTH
   type        : int
   default     : 2
   description : |-
     Pipeline depth (number of staging ring slots) for IBGDA send/recv.
     Only used when NCCL_CTRAN_IBGDA_SENDRECV_ENABLE=1.

 - name        : NCCL_CTRAN_BACKENDS
   type        : enumlist
   default     : ib, nvl, socket
   choices     : ib, nvl, socket, tcpdm, external
   description : |-
     Backends to enable for ctran
     ib - RoCE/IB backend
     nvl - NVLink backend; requires ib or socket to be enabled
     socket - Socket backend; enable it if ib is not available
     tcpdm - TCP device memory backend
     Usage: If the config is "ib, nvl, socket", the backend tries to enable
     ib first. If the ib initialization fails, the backend will enable socket.

 - name        : NCCL_CTRAN_IPC_REGCACHE_ENABLE_ASYNC_SOCKET
   type        : bool
   default     : true
   description : |-
     Enable the IpcRegCache async socket server and peer address exchange for
     NVL remote memory release notifications. When disabled, the NVL backend
     still works for window-based operations (which use the IB/Socket control
     channel).

 - name        : NCCL_CTRAN_PROFILING_REPORT_COUNT
   type        : int
   default     : 100
   description : |-
     Number of ops to report CTRAN profiling results periodically


 - name        : NCCL_CTRAN_CHECKSUM_BYTES_PER_THREAD_BLOCK
   type        : int
   default     : 131072
   description : |-
    Number of bytes for each thread block to compute checksum.

 - name        : NCCL_CTRAN_CHECKSUM_MAX_NUM_THREAD_BLOCKS
   type        : int
   default     : 32
   description : |-
     Maximum number of thread blocks used for checksum kernel. The number of
     thread blocks calculated by NCCL_CTRAN_CHECKSUM_BYTES_PER_THREAD_BLOCK
     cannot exceed this value.

 - name        : NCCL_CTRAN_ALLGATHER_CHECKSUM_SAMPLE_RATE
   type        : int
   default     : 0
   description : |-
     Checksum is disabled by default (when the sample rate is set to 0).
     If a non-zero value is provided, 1 out of every 'N' operations on each
     communicator will be sampled, where 'N' is the specified sample rate.

 - name        : NCCL_CTRAN_SENDRECV_CHECKSUM_SAMPLE_RATE
   type        : int
   default     : 0
   description : |-
     Checksum is disabled by default (when the sample rate is set to 0).
     If a non-zero value is provided, 1 out of every 'N' operations on each
     communicator will be sampled, where 'N' is the specified sample rate.
     It controls the sample rate for send/recv/sendrecv operations.


 - name        : NCCL_CTRAN_REGISTER_REPORT_SNAPSHOT_COUNT
   type        : int
   default     : -1
   description : |-
     Manages the frequency of register snapshot reporting. Set to -1 to
     completely disable. Set to 0 to report only at communicator destroy time.
     Set to N to allows a snapshot to be reported whenever once every N
     registrations. It helps understand the performance impact of registeration
     at different period of a long running job.


 - name        : NCCL_CTRAN_ALGO_PROFILING_OUTPUT
   type        : string
   default     : ""
   description : |-
     Output mode for algo profiling ("", "file", or "scuba"). When
      output mode is "", algo profiling is disabled.

 - name        : NCCL_CTRAN_ALGO_PROFILING_SAMPLING_WEIGHT
   type        : int
   default     : 0
   description : |-
     Sampling weight for algo profiling based on opCount per communicator.
     A collective is profiled when (opCount % samplingWeight == 0).
     For example, a sampling weight of 100 means every 100th collective
     on each communicator is profiled. Set to 0 to disable profiling,
     or 1 to profile every collective.


 - name        : NCCL_CTRAN_TRANSPORT_PROFILER
   type        : bool
   default     : false
   description : |-
     Enable Ctran transport profiling.

 - name        : NCCL_SLOW_RANK_ENABLE
   type        : bool
   default     : false
   description : |-
     Flag to enable slow rank module

 - name        : NCCL_SLOW_RANK_PERF_WINDOW_SIZE
   type        : int
   default     : 5
   description : |-
     This is the window for keeping track of rdma performance efficiency metric.
     If all the samples in this window are below the threshold then we flag the
     rank as slow.

 - name        : NCCL_SLOW_RANK_WQE_WINDOW_SIZE
   type        : int
   default     : 1
   description : |-
     If the number of wqe's completed is equal to this window size we
     calculatethe rdma perf efficiency for the window and push it in the queue.

 - name        : NCCL_SLOW_RANK_RDMA_PERF_EFFICIENCY_PERC
   type        : int
   default     : 70
   description : |-
     This is the threshold for rdma perf efficiency. If efficiency drops below
     this threshold then we flag the rank as slow.

 - name        : NCCL_SLOW_RANK_SCUBA_LOGGING_INTERVAL_IN_USECS
   type        : int
   default     : 1000000
   description : |-
     Scuba logging interval in microseconds.

 - name        : NCCL_SLOW_RANK_LOG_NSAMPLES
   type        : int
   default     : 10
   description : |-
     By default scuba logging is only enabled if slow rank detected. This flag
     gives us the option to log first n slow rank stats even if rank is not
     slow.

 - name        : NCCL_SLOW_RANK_VARIANCE_PERC
   type        : int
   default     : 20
   description : |-
     Only log slow rank data if the variance is more than this percentage.


 - name        : NCCL_CTRAN_ENABLE_TRACE_LOG
   type        : bool
   default     : false
   description : |-
     Enable CTran trace level logging.

 - name        : NCCL_CTRAN_ENABLE_DEV_TRACE_LOG
   type        : bool
   default     : false
   description : |-
     Enable CTran trace level logging in device kernel.


 - name        : NCCL_BROADCAST_ALGO
   type        : enum
   default     : orig
   choices     : orig, ctran, ctdirect, ctbtree
   description : |-
     The algorithm to use for broadcast communication
     orig - Copy-based communication
     ctran - Ctran-based communication auto-select
     ctdirect - Ctran-based algorithm directly distiributing data from root
     ctbtree - Ctran-based binomial-tree algorithm

 - name        : NCCL_SENDRECV_ALGO
   type        : enum
   default     : orig
   choices     : orig, ctran, ctzcopy, ctp2p, ctgraph
   description : |-
     The algorithm to use for sendrecv communication
     orig - Copy-based communication
     ctran - Ctran-based communication auto-select
     ctzcopy - Ctran-based zero-copy kernel for NVL
     ctp2p - Ctran-based point-to-point kernel for NVL
     ctgraph - Cudagraph-aware: pre-registers buffers during graph capture, falls back to baseline otherwise

 - name        : NCCL_ALLGATHER_P_ALGO
   type        : enum
   default     : ctpipeline
   choices     : ctdirect, ctpipeline, ctsrdpipeline
   description : |-
     The algorithm to use for AllgatherP communication
     ctdirect - Ctran-based direct point-to-point algorithm
     ctpipeline - Ctran-based pipeline algorithm that pipelines
                  inter-node rail ring and intra-node CopyEngine based copy
     ctsrdpipeline - Ctran-based hybrid algorithm that streams recursive-doubling
                     forwards across rails while keeping NVLink-domain CopyEngine
                     broadcast step-based. Requires nNodes to be a power of 2.

 - name        : NCCL_ALLGATHER_ALGO
   type        : enum
   default     : orig
   choices     : orig, ctran, ctdirect, ctring, ctsrd, ctbrucks, cthierarchical_ring, ctgraph, ctgraph_pipeline, ctgraph_rdpipeline, ctgraph_ring, ctgraph_rd, ctwin, ctwin_ring, ctwin_srd, ctwin_pipeline, ctwin_rdpipeline
   description : |-
     The algorithm to use for Allgather communication
     orig - Copy-based ring algorithm
     ctran - Picks the best ctran-based algorithm
     ctdirect - Ctran-based direct point-to-point algorithm
     ctring - Ctran-based ring algorithm
     ctsrd - Ctran-based streamed recursive doubling algorithm (streaming depth controlled by NCCL_CTRAN_ALLGATHER_CTSRD_FWD_PEERS)
     cthierarchical_ring - Pipes-based hierarchical AllGather using an inter-node IBGDA ring per local rank followed by intra-node NVLink fanout; with nLocalRanks==1 it degenerates to the hierarchical kernel's IB-only phase
     ctgraph - Cudagraph-aware: auto-selects pipeline/ring/rd based on topology during graph capture
     ctgraph_pipeline - Cudagraph-aware: forces persistent pipeline algorithm (nLocalRanks>1)
     ctgraph_rdpipeline - Cudagraph-aware: forces persistent recursive-doubling pipeline algorithm (nLocalRanks>1, nNodes power of 2)
     ctgraph_ring - Cudagraph-aware: forces ring algorithm (nLocalRanks==1, large messages)
     ctgraph_rd - Cudagraph-aware: forces recursive doubling algorithm (nLocalRanks==1, small messages)
     ctwin - Ctran window-aware: detects whether the recvbuf is in a registered symmetric window and
             dispatches to the persistent AllGatherP algorithm, similar to ctgraph. It auto-selects the AGP
             variant (pipeline / streamed-recursive-doubling) based on topology at dispatch.
     ctwin_ring - Ctran window-aware: forces dedicated ring algorithm (nLocalRanks==1), for benchmarking
     ctwin_srd - Ctran window-aware: forces dedicated streamed-recursive-doubling algorithm (nLocalRanks==1), for benchmarking
     ctwin_pipeline - Ctran window-aware: forces persistent AllGatherP pipeline algorithm, for benchmarking
     ctwin_rdpipeline - Ctran window-aware: forces persistent AllGatherP streamed-recursive-doubling pipeline algorithm, for benchmarking

 - name        : NCCL_CTGRAPH_ALLGATHER_RING_THRESHOLD
   type        : uint64_t
   default     : 134217728
   description : |-
     Minimum send size in bytes for ctgraph auto-select to choose ring over recursive doubling when nLocalRanks==1. Default 128MB.

 - name        : NCCL_CTRAN_ALLGATHER_CTSRD_FWD_PEERS
   type        : int
   default     : -1
   description : |-
     Immediate-forward depth for the ctsrd (streamed recursive-doubling)
     AllGather algorithm. Controls how many future-step peers a received
     chunk is forwarded to immediately on receipt; remaining forwards are
     staged and flushed at the start of the target step. A value of -1
     (default) means "forward to all future-step peers" (equivalent to the
     legacy recvOnly streamed-rd behavior, maximum send/recv overlap). A
     value of 0 stages everything (equivalent to the legacy non-streamed
     ctrd burst behavior). 1 forwards each chunk only to the next step
     (legacy full FC). Intermediate values are valid and produce a continuum
     between burst and full streaming. Must be >= -1.

 - name        : NCCL_REDUCESCATTER_ALGO
   type        : enum
   default     : orig
   choices     : orig, ctran, ctdirect, ctdirect_ib, ctring, ctring_ib, ctrhd
   description : |-
     The algorithm to use for ReduceScatter communication
     orig - Copy-based ring algorithm
     ctran - Ctran-based algorithm automatically picked by the library
     ctdirect - Ctran-based direct point-to-point algorithm
     ctdirect_ib - Ctran-based direct IB algorithm
     ctring - Ctran-based rail ring algorithm for inter-node only case
     ctring_ib - Prims-native IBGDA ring algorithm
     ctrhd - Ctran-based recursive vector-halving distance-doubling algorithm

 - name        : NCCL_REDUCESCATTER_PAT_AVG_ENABLE
   type        : bool
   default     : false
   description : |-
     Enable PAT algorithm with native AVG support for ReduceScatter operations.
     When enabled, ReduceScatter with ncclAvg uses FuncPatAvg for true floating-point
     division instead of FuncSumPostDiv (which only supports unsigned integers).

 - name        : NCCL_ALLTOALL_ALGO
   type        : enum
   default     : orig
   choices     : orig, ctran, ctgraph
   description : |-
     The algorithm to use for alltoall communication
     orig - Copy-based communication
     ctran - Ctran-based communication
     ctgraph - Cudagraph-aware Ctran-based communication (captured into a CUDA graph)

 - name        : NCCL_ALLTOALLV_ALGO
   type        : enum
   default     : orig
   choices     : orig, ctran, compCtran, bsCompCtran
   description : |-
     The algorithm to use for alltoallv communication
     orig - Copy-based communication
     ctran - Ctran-based communication
     compCtran - Compression-based communication using IB Control message exchange
     bsCompCtran - Compression-based communication with NCCL socket bootstrapping

 - name        : NCCL_RMA_ALGO
   type        : enum
   default     : ctran
   choices     : orig, ctran
   description : |-
     The algorithm to use for NCCL RMA communication
     orig - nccl rma communication
     ctran - Ctran-based rma communication

 - name        : NCCL_CTRAN_ENABLE
   type        : bool
   default     : false
   description : |-
     Enable Custom Transport. If it is disabled, all collectives will fallback
     to the default transport algorithm. It is recommended to always enable it
     unless Custom Transport initialization fails to function.

 - name        : NCCL_CTRAN_INTERNODE_TMPBUF_SIZE
   type        : uint64_t
   default     : 33554432
   description : |-
     Size of device temporary buffer allocated for inter-node
     communication.

 - name        : NCCL_CTRAN_NO_ERROR_CHECK
   type        : bool
   default     : false
   description : |-
     If true, skip error checks in Ctran collectives for better performance.

 - name        : NCCL_CTRAN_ENABLE_PRECONNECT
   type        : bool
   default     : true
   description : |-
     Enable CTRAN backends to pre-connect to peers at
     the beginning of the collective call.

 - name        : NCCL_CTRAN_ENABLE_PUT_FAST_PATH_FOR_SMALL_MSGS
   type        : bool
   default     : false
   description : |-
     Enable iput fast path (put can be sent through 1 WQE) for small messages
     if possible. When set to true, only if the msg size is less than maxWqeSize
     and there is no pending normal put in front of it, the put will go through
     the fast path in AllToAll.

 - name        : NCCL_SOCKET_TOS_CONFIG
   type        : int
   default     : -1
   description : |-
     Allow user to configure the TOS (type of service) field used by all NCCL sockets.
     -1 means no change to the default TOS value.

 - name        : NCCL_CLIENT_SOCKET_IFNAME
   type        : string
   default     : ""
   description : |-
     The NCCL_CLIENT_SOCKET_IFNAME variable specifies which IP interface to
     bind a client socket to for communication. Value is a single NIC string.
     Example: beth4. Default value is empty (bind nothing).
     All optimizations (by meta) for Large Scale Jobs

 - name        : NCCL_SOCKET_IPADDR_PREFIX
   type        : string
   default     : ""
   description : |-
     Specifies which IP address prefix to use for communication.
     All optimizations (by meta) for Large Scale Jobs

 - name        : NCCL_TCPSTORE_BACKOFF_INITIAL_INTERVAL
   type        : int
   default     : 500
   description : |-
     Initial interval for backoff in milliseconds.

 - name        : NCCL_TCPSTORE_BACKOFF_MULTIPLIER
   type        : double
   default     : 1.5
   description : |-
     Multiplier for backoff interval for tcpstore client.

 - name        : NCCL_TCPSTORE_BACKOFF_MAX_INTERVAL
   type        : int
   default     : 3000
   description : |-
     Maximum interval for backoff in milliseconds.

 - name        : NCCL_TCPSTORE_BACKOFF_RANDOMIZATION_FACTOR
   type        : double
   default     : 0.1
   description : |-
     Randomization factor for backoff interval for tcpstore client.

 - name        : NCCL_MASTER_ADDR
   envstr      : MASTER_ADDR
   type        : string
   default     : ""
   description : |-
     The ip-address where TCPStore server is launched (e.g localhost, 192.168.0.1)
     All optimizations (by meta) for Large Scale Jobs

 - name        : NCCL_MASTER_PORT
   envstr      : MASTER_PORT
   type        : uint16_t
   default     : 0
   description : |-
     The tcp port where TCPStore server is launched (e.g 8888)
     All optimizations (by meta) for Large Scale Jobs

 - name        : NCCL_TCPSTORE_CONNECT_TIMEOUT
   type        : int
   default     : 30
   description : |-
     Connection timeout for TCPStore client.
     All optimizations (by meta) for Large Scale Jobs

 - name        : NCCL_TCPSTORE_IO_TIMEOUT
   type        : int
   default     : 300
   description : |-
     IO timeout for TCPStore client.
     All optimizations (by meta) for Large Scale Jobs

 - name        : NCCL_COMM_STATE_DEBUG_TOPO
   type        : enum
   default     : system
   choices     : system, nolocal, vnode
   description : |-
     The topology set for debug.
     system -  System detected topology.
     nolocal - No local rank topology (i.e., nLocalRanks = 1)
     vnode - Custom virtual nodes to give some local ranks and some remote ranks topology
      (i.e., nLocalRanks = NCCL_COMM_STATE_DEBUG_TOPO_VNODE_NLOCALRANKS)

 - name        : NCCL_COMM_STATE_DEBUG_TOPO_VNODE_NLOCALRANKS
   type        : int
   default     : 2
   description : |-
      The number of local ranks when NCCL_COMM_STATE_DEBUG_TOPO is set to vnode.
      Must be less than or equal to the number of physical gpus on the node.
      The number of nodes will be infered as number of physical ranks / nLocalRanks.

 - name        : NCCL_FIRST_COMM_AS_WORLD
   type        : bool
   default     : false
   description : |-
     When set to true, the first communicator created will be taken as the comm
     world (assigned to NCCL_COMM_WORLD).
     All optimizations (by meta) for Large Scale Jobs

 - name        : NCCL_TOPO_FILE_PATH
   type        : string
   default     : "/etc/fbwhoami"
   description : |-
     [NCCLX] File that contains topology information in KEY=VALUE format

 - name        : NCCL_IGNORE_TOPO_LOAD_FAILURE
   type        : bool
   default     : false
   description : |-
      [NCCLX] When fail to load topology(e.g. device, rtsw), ignore this failure
      This may lead to silent failure or performance regression in some cases

 - name        : NCCL_COLLSTAT_REPORT_INTERVAL
   type        : int
   default     : 0
   description : |-
     Interval in iterations after which coll stats are reported to scuba.
     The amount of records being reported depends on parallelism being used and
     the implementation of the parallelism.
     If set to 0, coll stats are not reported to scuba.

 - name        : NCCL_COLLTRACE
   type        : stringlist
   default     : ""
   description : |-
     Enable collective trace collection by leveraging cuda events
     and a background thread. Valid options are comma separated list
     of the following features. Leave empty to disable all features.
     verbose - print every completed event as NCCL INFO log. Mostly for debug.
     trace - Just enable collective trace.
     algostat - lightweight algorithm counting (no CUDA events/worker thread).
                Use ncclx::colltrace::dumpAlgoStat(comm) to retrieve stats.

 - name        : NCCL_COLLTRACE_PENDING_QUEUE_SIZE
   type        : int
   default     : 4096
   description : |-
     How many pending collectives to keep in the pending queue. If the queue
     is full, the newest one will be dropped. Currently this only works for new
     colltrace implementation.

 - name        : NCCL_COLLTRACE_TRACE_CUDA_GRAPH
   type        : bool
   default     : false
   description : |-
     Enable colltrace for collectives launched in cuda graph. Currently we
     still haven't fully tested the performance impact of this feature. So
     it is disabled by default. In the future, we will enable it by default.

 - name        : NCCL_COLLTRACE_CTRAN_USE_CPU_RECORD
   type        : bool
   default     : true
   description : |-
     For all Ctran collective kernels, use CPU record instead of GPU record.
     This is to avoid the GPU record overhead for kernels.
     One exception is for collectives with checkSum Kernel, because we need
     to wait for the checkSum Kernel to finish in order to get the checksum.

 - name        : NCCL_COLLTRACE_RECORD_MAX
   type        : int
   default     : 20
   description : |-
     Maximum amount of past collectives CollTrace will record.
     If the amount of collective exceeds this value, the oldest one will be
     dropped. Set the value to -1 will make CollTrace record all collectives.
     It serves as a very loose upper bound to ensure even if iteration count
     is not available, we still don't record all the collectives.

 - name        : NCCL_COLLTRACE_RECORD_MAX_ITERATIONS
   type        : int
   default     : 2
   description : |-
     Maximum number of iterations CollTrace will record.
     CollTrace will record all the collectives from the last N iterations.
     If the amount of iterations exceeds this value, the oldest one will be
     dropped.
     The default value is 2, meaning the current iteration and the previous
     (e.g. current collective in iteration 5, it will keep all the collectives
     in iteration 4 and 5).
     Set to 0 to disable recording past collectives.

 - name        : NCCL_COLLTRACE_ITERATION_MODE
   type        : bool
   default     : false
   description : |-
     If true, CommDumpPlugin retains all collectives from recent training
     iterations (set via ncclxSetIteration) instead of a fixed count.
     The number of iterations retained is controlled by
     NCCL_COLLTRACE_RECORD_MAX_ITERATIONS. Falls back to a hard upper bound
     (NCCL_COLLTRACE_ITERATION_UPPER_BOUND, default 3000) if iteration
     tracking is not active.

 - name        : NCCL_COLLTRACE_ITERATION_UPPER_BOUND
   type        : int
   default     : 3000
   description : |-
     Hard upper bound on past collectives retained when
     NCCL_COLLTRACE_ITERATION_MODE is enabled. Prevents unbounded growth
     if ncclxSetIteration is never called.

 - name        : NCCL_COLLTRACE_SLOW_COLL_THRESHOLD_BY_PG
   type        : stringlist
   default     :
   description : |-
     Comma separated list of PG name and threshold in ms. If a collective takes
     longer than the specifies threshold, it will be logged to scuba. The format
     for each element in the stringlist is "<PG Prefix>:<thresholdInMs>".
     To specify any PG, use "ANY" as the prefix. To specify not record any
     collective for a specific PG, use -1 as the threshold. By default, no
     collectives will be logged to scuba.
     Example: "TP:100,PP:200" will log all collectives in TP group to scuba
     if it takes longer than 100ms, and all collectives in PP group to scuba
     if it takes longer than 200ms.

 - name        : NCCL_COLLTRACE_REPORT_FIRST_N_COLL
   type        : int64_t
   default     : 10
   description : |-
     Report the first N collectives to scuba. If the value is 0, no collectives
     will be reported. Currently we DO NOT report WaitNotify and PutNotify

 - name        : NCCL_COLLTRACE_REPORT_INTERVAL_SEC
   type        : int
   default     : 0
   description : |-
     Determines the interval in seconds colltrace is reported to scuba (after the first N) .
     If the value is 0, periodic reporting is disabled.

 - name        : NCCL_COLLTRACE_CHECK_INTERVAL_MS
   type        : int64_t
   default     : 10
   description : |-
     Determines how often the colltrace thread checks for the finish of a event
     A longer interval will reduce the overhead of the colltrace thread, but
     may delay the reporting of collective status. A long interval should not
     affect the precision of collective latency nor start/end time points. The
     default value is 10ms.

 - name        : NCCL_COLLTRACE_WAKEUP_INTERVAL_MS
   type        : int64_t
   default     : 1000
   description : |-
     Only used in new colltrace. Determines how often the colltrace thread wakes
     up while waiting for the finish of a event. A longer interval will reduce
     cpu usage. The default value is 1000ms.

 - name        : NCCL_COLLTRACE_WATCHDOG_DEFAULT_TIMEOUT_SEC
   type        : int64_t
   default     : 600
   description : |-
     Default timeout in seconds for collective watchdog. If a collective
     does not finish within the timeout, colltrace will crash the process.
     The default value is 10 minutes. The gloalhint from the user program takes
     precedence over this env var for the actual time colltrace will wait.

 - name        : NCCL_COLLTRACE_PERIODIC_REANCHOR
   type        : bool
   default     : False
   description : |-
     When true, the colltrace poll thread periodically (~1 Hz) re-records the
     GPU-time ↔ wall-clock anchors used by graph mode (GlobaltimerCalibration)
     and eager mode (CudaReferencePoint) to bound drift between the GPU's
     oscillator and PTP-aligned wall time below ~100 ns at 100 ppm. When
     false (default), each anchor is taken once at construction and never
     refreshed; long-running jobs accumulate ~36–360 ms/hour of drift. The
     refresh path issues CUDA calls from the colltrace thread; this flag
     exists so deployments that have observed CUDA-on-non-main-thread hangs
     can disable the feature without rebuilding.

 - name        : NCCL_COLLTRACE_FATAL_ON_CALIBRATION_FAILURE
   type        : bool
   default     : True
   description : |-
     When true (default), GlobaltimerCalibration's constructor crashes via
     XLOG(FATAL) if the initial CUDA-side anchor read fails — without a
     valid anchor, graph-mode timestamps would map to ~50 years before the
     UNIX epoch, which is worse than crashing. When false, the failure is
     logged at ERROR severity, the anchor is left at its default state,
     and the periodic refresh thread (gated on NCCL_COLLTRACE_PERIODIC_REANCHOR)
     gets a chance to populate it later. Until refresh succeeds, graph-mode
     timestamps will be near the UNIX epoch and a rate-limited warning is
     emitted on each toWallClock() call.

 - name        : NCCL_USE_PTP
   type        : bool
   default     : true
   description : |-
     When true, colltrace's PrecisionClock initializes fbclock and emits
     PTP-aligned wall-time stamps with a known uncertainty window — fleet-
     comparable across hosts. When false (or when fbclock_init fails on the
     host), PrecisionClock falls back to std::chrono::system_clock (host
     clock, possibly NTP-disciplined, with no uncertainty annotation).
     Read once via getenv() during PrecisionClock's lazy singleton
     construction, before ncclCvarInit() runs in many call paths — this
     entry exists for discoverability and cvar-dump tooling; the actual
     read in PrecisionClock.cc is direct and does not consult /etc/nccl.conf.
     PrecisionClock falls back to NCCL_USE_PTP_DEFAULT_LITERAL (a compile-
     time constant emitted by extractcvars.py from this `default:` field)
     when the env var is unset, so the code default tracks the yaml default
     without manual sync.

 - name        : NCCL_GIN_TYPE
   type        : int64_t
   default     : 0
   description : |-
     GPU-Initiated Network (GIN) type configuration. This controls the type
     of GIN implementation to use for network operations.

 - name        : NCCL_IB_ASYNC_EVENT_LOOP
   type        : enum
   default     : baseline
   choices     : baseline, ctran
   description : |-
     IB Async Event polling loop; only one can run.
     baseline - original unmodified baseline loop.
     ctran - new ctran polling loop with error handling/detection.
     Setting ctran in pure baseline mode or baseline in pure
     ctran mode is an error.

 - name        : NCCL_IB_LINK_DOWN_TIMEOUT
   type        : int
   default     : 0
   description : |-
     Link down timeout in seconds.
     Set to zero to disable timeout feature.

 - name        : NCCL_ALLREDUCE_ALGO
   type        : enum
   default     : orig
   choices     : orig, ctran, ctdirect, ctring, ctree, cthierarchical_ring
   description : |-
     The algorithm to use for Allreduce communication
     orig - Copy-based algorithm
     ctran - Picks the best ctran-based algorithm
     ctdirect - Ctran-based direct point-to-point algorithm
     ctring - ctran-based ring algorithm
     ctree - Ctran-based tree algorithm (Pipes-native)
     cthierarchical_ring - Ctran-based hierarchical ring algorithm (Prims-native): NVL ReduceScatter + inter-node IBGDA ring + NVL AllGather

 - name        : NCCL_ALLREDUCE_TYPE
   type        : enum
   default     : orig
   choices     : orig, ncclFloat32
   description : |-
     The data type used in reduction. It is used in low-preduction reduction algorithms.
     orig - use the original data type for reduction
     ncclFloat32 - use float32 for reduction

 - name        : NCCL_DDA_TMPBUFF_SIZE
   type        : uint64_t
   default     : 33554432
   description : |-
     DDA temporary buffer size.

 - name        : NCCL_DDA_ALLREDUCE_TREE_THRESHOLD
   type        : uint64_t
   default     : 262144
   description : |-
     Message size at which DDA Allreduce switches to the tree algorithm.

 - name        : NCCL_DDA_ALLREDUCE_SCATGAT_THRESHOLD
   type        : uint64_t
   default     : 1048576
   description : |-
     Message size at which DDA Allreduce switches to the scatter-gather
     algorithm.

 - name        : NCCL_DDA_ALLREDUCE_MAX_BLOCKS
   type        : int
   default     : 24
   description : |-
     DDA Allreduce max number of blocks.

 - name        : NCCL_ALL_REDUCE_SPARSE_BLOCK_NUM_THREAD_BLOCKS
   type        : int
   default     : -1
   description : |-
     Number of thread blocks to use for ncclAllReduceSparse.  -1 means
     automatically pick the number of thread blocks to use.

 - name        : NCCL_ALL_REDUCE_SPARSE_BLOCK_THREAD_BLOCK_SIZE
   type        : int
   default     : -1
   description : |-
     Thread block size to use for ncclAllReduceSparse.  -1 means
     automatically pick the thread block size to use.

 - name        : NCCL_COMMSMONITOR_ENABLE
   type        : bool
   default     : true
   description : |-
     Enable comms monitor to monitor the creation and destruction of NCCL
     communicators. This is required to be enabled for ncclCommDumpAll to
     work.

 - name        : NCCL_CTRAN_ENALBE_CLUSTER_KERNEL_LAUNCH
   type        : bool
   default     : false
   description : |-
     Enable kernel launch in cluster mode. The default cluster size is 4.
     On SM90+ architectures (compute capability ≥ 90).
     NCCL can group multiple thread blocks together into clusters.

 - name        : NCCL_CTRAN_CGA_CLUSTER_SIZE
   type        : int
   default     : 4
   description : |-
     Cluster size for CGA kernel launch. The default cluster size is 4.

 - name        : NCCL_IBVERBS_PATH
   type        : string
   default     : "libibverbs.so"
   description : Path to libibverbs.so. This allows fault injection for
     verbs APIs in NCCLx.

 - name        : NCCL_IBVERBS_LIB
   type        : string
   default     : ""
   description : Override the default libibverbs shared library name.
     Added in upstream NCCL 2.30. When set, NCCL will attempt to load
     this library before falling back to libibverbs.so.

 - name        : NCCL_COMM_ABORT_SCOPE
   type        : enum
   default     : comm
   choices     : comm, job, none
   description : |-
     Scope of resources to destroy on ncclCommAbort.  If set to comm,
     only the communicator is destroyed.  If set to job, the entire
     job is force aborted. If set to none, it immediately returns and
     no resources are destroyed. It will relies on the upper layer to
     terminate the whole process.

 - name        : NCCL_NETWORK_PERF_MONITOR_ENABLE
   type        : bool
   default     : false
   description : |-
     Enable network perf monitor to monitor the bandwidth of NCCL.

 - name        : NCCL_CTRAN_ALLOW_CUDA_GRAPH
   type        : bool
   default     : false
   description : |-
     Preallocate runtime buffers at communicator creation time,
     allowing the communicator to be usable in CUDA graph mode
     (runtime allocation and mapping of buffers is not CUDA graph
     safe).

 - name        : NCCL_CTRAN_ENABLE_PERFTRACE
   type        : bool
   default     : false
   description : |-
     Enable trace for ctran algorithm performance profiling.

 - name        : NCCL_CTRAN_PERFTRACE_DIR
   type        : string
   default     : "/tmp/"
   description : |-
     The local directory to store ctran perftrace json files.
     The default value is /tmp/, and the trace file will be stored in /tmp/ctran_trace_log.*.log.
     If want to upload to manifold, set this as /tmp/{uuid}, then manually upload to manifold.

 - name        : NCCL_DEBUG_LOGGING_ASYNC
   type        : bool
   default     : true
   description : |-
     Controls if the folly logging should be async or not.

 - name        : NCCL_NETWORK_PERF_MONITOR_SCUBA_LOGGING_ENABLE
   type        : bool
   default     : False
   description : |-
     Enable network perf monitor to report info to scuba.

 - name        : NCCL_COMM_REGISTER_LOG_ENABLE
   type        : bool
   default     : false
   description : |-
     Enable top level nccl comm register/deregister call logging.

 - name        : NCCL_NET_GDR_C2C
   type        : bool
   default     : false
   description : |-
     The NCCL_NET_GDR_C2C variable enables GPU Direct RDMA when sending
     data via a NIC attached to a CPU (i.e. distance PHB) where the CPU
     is connected to the GPU via a C2C interconnect. This effectively
     overrides the NCCL_NET_GDR_LEVEL setting for this particular NIC.

 - name        : NCCL_CTRAN_SOCKET_POLL_TIMEOUT
   type        : int32_t
   default     : 20
   description : |-
     Polling timeout in milliseconds for CTRAN socket.

 - name        : NCCL_LAUNCH_RACE_FATAL
   type        : bool
   default     : true
   description : |-
     If true, ncclCommInitRank will fatal if it detects a race condition

 - name        : NCCL_SOCKET_RCVBUF
   type        : int
   default     : -1
   description : |-
     Set the socket receive buffer size.

 - name        : NCCL_SOCKET_SNDBUF
   type        : int
   default     : -1
   description : |-
     Set the socket send buffer size.

 - name        : NCCL_SYM_KERNEL
   type        : string
   default     : ""
   description : |-
     Set symmetric kernel function.

 - name        : NCCL_DEBUG_TIMESTAMP_LEVELS
   type        : string
   default     : WARN
   description : https://docs.nvidia.com/deeplearning/nccl/user-guide/docs/env.html#nccl-debug-timestamp-levels

 - name        : NCCL_DEBUG_TIMESTAMP_FORMAT
   type        : string
   default     : ""
   description : https://docs.nvidia.com/deeplearning/nccl/user-guide/docs/env.html#nccl-debug-timestamp-format

 - name        : NCCL_SYM_CTAS
   type        : int
   default     : 0
   description : |-
     Set the maximal number of CTAs for symmetric kernel function.

 - name        : NCCL_MNNVL_SCATTER_NETS_ENABLE
   type        : bool
   default     : false
   description : |-
     Enable MNNVL scatter nets.

 - name        : NCCL_LL128_C2C
   type        : bool
   default     : True
   description : |-
     Enable LL128 C2C.

 - name        : NCCL_NET_PLUGIN_REF_COUNT
   type        : int
   default     : 1
   description : |-
     Reference count for the net plugin.

 - name        : NCCL_PXN_C2C
   type        : bool
   default     : False
   description : |-
     Enable PXN C2C.

 - name        : NCCL_SOCKET_INLINE
   type        : int
   default     : 128
   description : |-
     Set the socket inline size.

 - name        : NCCL_SOCKET_MIN_TASKSIZE
   type        : int
   default     : 65536
   description : |-
     Set the minimum task size for socket. /*64 kiB=*/

 - name        : NCCL_IB_DATA_DIRECT
   type        : int
   default     : 1
   description : |-
     NCCL IB data direct.

 - name        : NCCL_LAUNCH_ORDER_IMPLICIT
   type        : bool
   default     : false
   description : |-
     Enable implicit launch order.

 - name        : NCCL_NVLINK_UTIL_CENTRIC_SCHED_ENABLE
   type        : bool
   default     : false
   description : |-
     Enable NVLINK util centric scheduling.

 - name        : NCCL_WIN_STRIDE
   type        : int
   default     : -1
   description : |-
     Set win stride.

 - name        : NCCL_WIN_ENABLE
   type        : bool
   default     : True
   description : |-
     Enable the win algorithm.

 - name        : NCCL_COMM_SHRINK_SHARE_RESOURCES
   type        : int
   default     : MIN
   description : |-
     Set comm shrink share resources.

 - name        : NCCL_ENV_CTA_POLICY
   envstr      : NCCL_CTA_POLICY
   type        : int
   default     : MIN
   description : |-
     Set the CTA policy.
     https://docs.nvidia.com/deeplearning/nccl/user-guide/docs/env.html#nccl-cta-policy

 - name        : NCCL_NETDEVS_POLICY
   type        : string
   default     : ""
   description : https://docs.nvidia.com/deeplearning/nccl/user-guide/docs/env.html#nccl-netdevs-policy

 - name        : NCCL_NVTX_DISABLE
   envstr      : NCCL_NVTX_DISABLE
   type        : bool
   default     : false
   description : |-
     Disable NVTX. NVTX (NVIDIA Tools Extension SDK) is a C-based API that allows developers
     to annotate their applications with events, code ranges, and resource names to improve
     performance analysis using NVIDIA profiling tools like Nsight. By integrating NVTX,
     developers can visualize CPU and GPU activity, identify performance bottlenecks, and
     have greater visibility of their application's execution flow on NVIDIA hardware.

 - name        : NCCL_MNNVL_TRUNK_DISABLE
   type        : bool
   default     : false
   description : |-
     By default all 72 gpu's in gb200 are in a single nvlink domain. Enabling this flag
     disables NVlink P2P access between GPU's in 2 racks connected via trunk links
     and use RDMA instead.

 - name        : NCCL_MNNVL_DETERMINISTIC_COLLECTIVE_ENABLE
   type        : bool
   default     : false
   description : |-
     If false, NCCL_MNNVL_CLIQUE_SIZE would be ignored.
     User needs to set this ENV to true explicitly to enable software NVLINK domain partition,
     which is a prerequisite for deterministic training in MNNVL systems.

 - name        : NCCL_MNNVL_CLIQUE_SIZE
   type        : int
   default     : 0
   description : |-
     The maximum number of GPUs that are considered to be within a single nvlink clique. By default it is 0,
     which means no software overrides on the clique size.

 - name        : NCCL_CTRAN_UNPACK_THREAD_BLOCK_SIZE
   type        : uint64_t
   default     : 256
   description : |-
    TCP Device Memory upack kernel: number of threads in the block.

 - name        : NCCL_CTRAN_UNPACK_NUM_THREAD_BLOCKS
   type        : uint64_t
   default     : 8
   description : |-
    TCP Device Memory upack kernel: number of blocks.

 - name        : NCCL_CTRAN_WIN_SIGNAL_SIZE
   type        : int32_t
   default     : 256
   description : |-
     Configure the size of the signal buffer (measured in uint64_t units) allocated for each rank in Ctran window.
     This buffer is used for synchronization between ranks during remote memory access (RMA) operations.

 - name        : NCCL_CTRAN_ALLREDUCE_RING_TMPBUF_CHUNK_SIZE
   type        : uint64_t
   default     : 0
   description : |-
     size in bytes of each chunk for temporary send and receive buffers used in
     NCCL CTRAN allreduce ring. The size of each temporary buffer is
     NCCL_CTRAN_ALLREDUCE_RING_TMPBUF_CHUNK_SIZE * NCCL_CTRAN_ALLREDUCE_RING_TMPBUF_NUM_CHUNKS.

 - name        : NCCL_CTRAN_ALLREDUCE_RING_TMPBUF_NUM_CHUNKS
   type        : uint32_t
   default     : 0
   description : |-
     number of chunks allocated for temporary send and receive buffers used in
     NCCL CTRAN allreduce ring. The size of each temporary buffer is
     NCCL_CTRAN_ALLREDUCE_RING_TMPBUF_CHUNK_SIZE * NCCL_CTRAN_ALLREDUCE_RING_TMPBUF_NUM_CHUNKS.

 - name        : NCCL_CTRAN_ALLREDUCE_RING_MIN_SHARD_SIZE
   type        : uint32_t
   default     : 16
   description : |-
     minimal size in bytes for a ring shard. If the allreduce size divided by
     number of ranks is smaller than this value, single-shard ring is used.

 - name        : NCCL_CTRAN_ALLREDUCE_RING_MAX_NUM_THREAD_BLOCKS
   type        : int
   default     : 0
   description : |-
     Maximum number of thread blocks used for the AllReduce kernel.
     We might use fewer thread blocks, if we can achieve max occupancy
     with them.

 - name        : NCCL_CTRAN_ALLREDUCE_RING_NUM_THREAD_BLOCKS
   type        : int
   default     : 0
   description : |-
     Force the exact number of thread blocks for the AllReduce Ring
     kernel, bypassing the auto-tuner. When set to > 0, the auto-tuner
     block selection is skipped and this value is used directly.
     Use with NCCL_CTRAN_ALLREDUCE_RING_THREAD_BLOCK_SIZE to fully
     override the auto-tuner.

 - name        : NCCL_CTRAN_ALLREDUCE_RING_THREAD_BLOCK_SIZE
   type        : int
   default     : 0
   description : |-
     Number of threads in each thread block used for the AllReduce
     kernel.

 - name        : NCCL_CTRAN_ALLREDUCE_RING_AUTO_TUNE_MAX_BDP
   type        : int
   default     : 0
   description : |-
     Enable auto-tuning of AllReduceRing parameters based on message size.
     When enabled, overrides MAX_NUM_THREAD_BLOCKS and pipeline parameters
     with per-message-size optimal values. Set to 0 to use static CVAR
     values instead.

 - name        : NCCL_CTRAN_ALLREDUCE_RING_QP_SCALING_TH_MIN
   type        : int64_t
   default     : 262144
   description : |-
     Lower bound (in bytes) for the QP scaling threshold in AllReduceRing autotune.
     The threshold is clamped to [this value, TH_MAX]. Default: 262144 (256KB).
     Autotune-derived QP scaling is disabled when TH_MIN < 0, TH_MAX <= 0,
     or TH_MAX < TH_MIN.

 - name        : NCCL_CTRAN_ALLREDUCE_RING_QP_SCALING_TH_MAX
   type        : int64_t
   default     : 524288
   description : |-
     Upper bound (in bytes) for the QP scaling threshold in AllReduceRing autotune.
     The threshold is clamped to [TH_MIN, this value]. Default: 524288 (512KB).
     Autotune-derived QP scaling is disabled when TH_MIN < 0, TH_MAX <= 0,
     or TH_MAX < TH_MIN.

 - name        : NCCL_CTRAN_ALLREDUCE_RING_STAGING_BUF_SIZE
   type        : int64_t
   default     : 0
   description : |-
     Size of the staging (tmp send/recv) buffer per direction in bytes.
     When set to 0 (default), uses the built-in kStagingBufSize constant (32MB).

 - name        : NCCL_CTRAN_ALLREDUCE_RING_BIDIR_AG_MAX_SIZE
   type        : int64_t
   default     : -2
   description : |-
     Maximum message size in bytes for bi-directional AllGather optimization
     in AllReduceRing. Bi-directional AG sends data in both directions
     simultaneously during the AllGather phase, reducing total steps.
     Set to 0 to disable bi-directional AG entirely.
     Set to -1 to enable for all message sizes.
     Set to -2 to auto-tune per GPU architecture (GB200: 128MB, H100: 4MB).
     Set to a positive value to enable only for messages up to that size.

 - name        : NCCL_CTRAN_ENABLE_FAULT_TOLERANCE
   type        : bool
   default     : False
   description : |-
     [WIP] Enable CTran Fault Tolerance feature. The feature is wip,
     currently no collectives support Fault Tolerance.

 - name        : NCCL_PROXY_CPUSET
   type        : string
   default     : ""
   description : Used to bind NCCL's network proxy threads to specific CPU cores.

 - name        : MCCL_CTRAN_BACKENDS
   type        : enumlist
   default     : not_set
   choices     : not_set, ib, nvl, socket, tcpdm
   description : |-
     MCCL Backend override to enable for ctran. It should uses the same format
     as NCCL_CTRAN_BACKENDS. By deafult, it is not_set, which means it will use whatever
     backends specified by NCCL_CTRAN_BACKENDS.
     Usage: If the NCCL_CTRAN_BACKENS is set with certain values,
     this config will allow MCCL to override backends.

 - name        : MCCL_BOOTSTRAP_SOCKET_HEALTH_POLL_ENABLED
   type        : bool
   default     : true
   description : |-
     Enable MCCL Bootstrap READY-socket health polling. When enabled, Bootstrap
     polls established peer sockets and converts kernel-observed socket errors
     or peer close into communicator abort. Disable this as a kill switch for
     the socket-health polling path; active Bootstrap socket I/O errors still
     use the separate callback path.

 - name        : MCCL_BOOTSTRAP_TCP_KEEPALIVE_ENABLED
   type        : bool
   default     : false
   description : |-
     Enable TCP keepalive on MCCL Bootstrap sockets. When enabled, Bootstrap
     applies its TCP keepalive options to outgoing and accepted CoroSocket
     instances so the kernel can surface half-open peer failures. Disabled by
     default so production behavior is unchanged unless explicitly opted in.

 - name        : MCCL_SCUBA_ENABLED
   type        : bool
   default     : true
   description : |-
     Enable MCCL Scuba structured logging. When enabled, MCCL will log
     events to dedicated MCCL Scuba tables for observability and debugging.
     This is separate from NCCLX logging to minimize risk.

 - name        : MCCL_SCUBA_LOG_LEVEL
   type        : enum
   default     : NORMAL
   choices     : CRITICAL, HIGH, NORMAL, LOW
   description : |-
     Minimum log priority level for MCCL Scuba logging. Only logs at or above
     this priority level will be forwarded to Scuba; lower-priority logs are
     dropped. The priority levels from highest to lowest are:
       CRITICAL - Critical logs only (e.g., errors, failures)
       HIGH     - Critical and high-priority logs (e.g., important events)
       NORMAL   - Critical, high, and normal logs (default operational logs)
       LOW      - All logs including low-priority (verbose/debug)
     For example, setting MCCL_SCUBA_LOG_LEVEL=HIGH means only HIGH and
     CRITICAL priority logs will be forwarded to Scuba.

 - name        : MCCL_CTRAN_TRANSPORT_PROFILER
   type        : bool
   default     : true
   description : |-
     Enable ctran transport profiling for MCCL. When true (and the rank
     passes MCCL_FILTER_PROFILER_LOGGING_BY_RANKS), MCCL sets
     comm_->config_.enableProfiler and injects BOTH
     McclAlgoProfilerReporter and McclGpeProfilerReporter into
     ctranInit. Algo rows land in mccl_operation_trace with
     mcclop="ALGO_PROFILING"; GPE per-tracepoint rows land in the same
     table with mcclop="GPE_PROFILING". Set to false to disable both
     reporters from the MCCL level (CTRAN-side defaults for the GPE
     profiler still apply per NCCL_CTRAN_GPE_PROFILING_ENABLE).

 - name        : MCCL_FILTER_PROFILER_LOGGING_BY_RANKS
   type        : stringlist
   default     : "0"
   description : |-
     Comma-separated list of global ranks allowed to write profiler
     operation data to filter logs (mccl_operation_trace). Only effective
     when MCCL_CTRAN_TRANSPORT_PROFILER is enabled (true by default),
     which controls whether ctran profiling data flows to
     mccl_operation_trace. This filter applies only to profiler
     operation trace samples; other log types are not affected. When
     this list is non-empty, only the specified ranks will have their
     profiler samples written; all other ranks are silently skipped.
     Default: "0" (only rank 0 logs). Set to an empty string to allow
     all ranks to log.

 - name        : MCCL_PROFILER_STEP_LOGGING_INTERVAL
   type        : int
   default     : 113
   description : |-
     Controls step-based profiler logging at the MCCL level. When the
     training step (from AllReduceOpts kvPairs["step"]) is a multiple of this
     interval, all allreduce profiler data for that step is logged,
     bypassing the per-op NCCL_CTRAN_ALGO_PROFILING_SAMPLING_WEIGHT filter.
     Rank filtering (MCCL_FILTER_PROFILER_LOGGING_BY_RANKS) still applies.
     Set to 0 or negative to disable step-based logging.

 - name        : NCCL_GIN_GDAKI_NIC_HANDLER
   type        : int
   default     : 0
   description : https://docs.nvidia.com/deeplearning/nccl/user-guide/docs/env.html#nccl-gin-gdaki-nic-handler

 - name        : NCCL_GIN_GDAKI_QP_DEPTH
   type        : int
   default     : 128
   description : https://docs.nvidia.com/deeplearning/nccl/user-guide/docs/env.html#nccl-gin-gdaki-qp-depth

 - name        : NCCL_GIN_ERROR_QUERY_SEC
   type        : int
   default     : 10
   description : https://docs.nvidia.com/deeplearning/nccl/user-guide/docs/env.html#nccl-gin-error-query-sec

 - name        : NCCL_GIN_ENABLE
   type        : int
   default     : 1
   description : https://docs.nvidia.com/deeplearning/nccl/user-guide/docs/env.html#nccl-gin-enable

 - name        : NCCL_GIN_SIGNAL_POOL_SIZE
   type        : int
   default     : 65536
   description : https://docs.nvidia.com/deeplearning/nccl/user-guide/docs/env.html#nccl-gin-signal-pool-size

 - name        : NCCL_GIN_COUNTER_POOL_SIZE
   type        : int
   default     : 65536
   description : https://docs.nvidia.com/deeplearning/nccl/user-guide/docs/env.html#nccl-gin-counter-pool-size

 - name        : NCCL_GIN_NCONTEXTS
   type        : int
   default     : 4
   description : https://docs.nvidia.com/deeplearning/nccl/user-guide/docs/env.html#nccl-gin-ncontexts

 - name        : NCCL_MNNVL_RAIL_PER_HOST
   type        : int
   default     : 0
   description : https://docs.nvidia.com/deeplearning/nccl/user-guide/docs/env.html#nccl-mnnvl-rail-per-host

 - name        : NCCL_GIN_PROXY_QUEUE_SIZE
   type        : int
   default     : -1
   description : https://docs.nvidia.com/deeplearning/nccl/user-guide/docs/env.html#nccl-gin-proxy-queue-size

 - name        : NCCL_P2P_SCHEDULE_GROUP_SIZE
   type        : int
   default     : 8
   description : https://docs.nvidia.com/deeplearning/nccl/user-guide/docs/env.html#nccl-p2p-schedule-group-size

 - name        : NCCL_IPC_USE_ABSTRACT_SOCKET
   type        : int
   default     : 1
   description : https://docs.nvidia.com/deeplearning/nccl/user-guide/docs/env.html#nccl-ipc-use-abstract-socket

 - name        : NCCL_SYM_NOWIN_ENABLE
   type        : int
   default     : 0
   description : |-
     Controls whether symmetric LL (Low-Latency) kernels are allowed to run on
     buffers that are not registered in symmetric memory windows (i.e., with
     winRegType == ncclSymSendNonregRecvNonreg). When disabled (0, the default),
     if the scheduler selects a symmetric LL kernel but the send and receive
     buffers are not window-registered, NCCL queries the legacy cost model and
     falls back to a legacy kernel unless the legacy model also selects the LL
     protocol. When enabled (1), this fallback check is bypassed, allowing
     symmetric LL kernels to proceed even with non-registered buffers. This
     preference is overridden if the user has already forced a specific symmetric
     kernel via NCCL_SYM_KERNEL, or if both buffers are registered (in which case
     symmetric kernels always proceed without fallback).

 - name        : NCCL_SOCKET_POLL_TIMEOUT_MSEC
   type        : int
   default     : 100
   description : https://docs.nvidia.com/deeplearning/nccl/user-guide/docs/env.html#nccl-socket-poll-timeout-msec

 - name        : NCCL_MULTI_SEGMENT_REGISTER
   type        : int
   default     : 1
   description : |-
     Controls whether NCCL allows registration of user buffers that span multiple
     CUDA virtual memory segments (i.e., buffers backed by multiple physical
     allocations mapped into a contiguous virtual address range). When enabled (1,
     the default), multi-segment buffers are registered for zero-copy transport
     across Net, NVLS, and P2P paths. When disabled (0), any buffer spanning more
     than one segment is silently skipped for registration, falling back to staged
     copy paths. This is relevant for workloads using CUDA VMM (Virtual Memory
     Management) APIs where allocations may comprise multiple physical segments.
     The flag acts as a safety valve to disable multi-segment registration if it
     causes issues.

 - name        : NCCL_RMA_PROXY_DUMP_SIGNAL
   type        : int
   default     : -1
   description : |-
     Specifies a POSIX signal number that, when sent to the process, triggers a
     dump of the RMA (Remote Memory Access) proxy state for debugging purposes.
     When set to a valid signal number (e.g., 10 for SIGUSR1), the RMA proxy
     progress thread registers a signal handler that prints comprehensive
     diagnostic information about the proxy state to stdout, including per-rank
     sequence numbers, queue indices, pending and in-progress descriptors. The
     default value of -1 means no signal handler is registered and this debugging
     facility is disabled. This is a diagnostic tool for troubleshooting RMA proxy
     hangs or performance issues.

 - name        : NCCL_RMA_PROXY_QUEUE_SIZE
   type        : int
   default     : -1
   description : |-
     Controls the size of the lock-free circular buffer queue used by the RMA
     proxy for pending network operation descriptors, on a per-peer basis. The
     default value of -1 means the queue size is automatically set to
     NCCL_NET_MAX_REQUESTS * props.maxRecvs (the maximum number of outstanding
     network requests). The value must be a power of two, at least 1, and no
     greater than the maximum outstanding requests; if any constraint is violated,
     the value falls back to the automatic default. A smaller queue reduces memory
     usage but may limit concurrency, while a larger queue allows more outstanding
     operations between the GPU and the network proxy thread.

 - name        : NCCL_P2P_PER_CHANNEL_NET_BW
   type        : int
   default     : 14
   description : |-
     Specifies the assumed per-channel network bandwidth in GB/s used to calculate
     the number of network channels for P2P (point-to-point) communication with
     remote peers. When NCCL determines the channel count for cross-node P2P
     operations, it divides the total available network bandwidth by this value to
     decide how many channels are needed to saturate the link. A lower value causes
     more channels to be allocated (potentially improving throughput on
     high-bandwidth networks), while a higher value reduces the channel count. The
     computed channel count is bounded below by the number of NICs available to the
     GPU. The default of -1 resolves internally to 14 GB/s, roughly corresponding
     to a single HDR InfiniBand port.

 - name        : NCCL_ENABLE_VERSION_CHECK
   type        : int
   default     : -1
   description : |-
     Controls whether NCCL validates that the compile-time NCCL version is
     compatible with the runtime library version when applications call device
     communicator APIs (ncclCommQueryProperties, ncclDevCommCreate). When enabled
     (resolves to 1 by default), NCCL checks that the version the application was
     compiled against does not exceed the runtime library version and is not below
     a minimum supported version, returning ncclInvalidUsage on mismatch. Setting
     this to 0 disables all version validation, which can be useful for development
     or testing scenarios where version mismatches are intentional. The check
     prevents subtle ABI incompatibilities that could cause crashes or data
     corruption.

 - name        : NCCL_ALLGATHERV_ENABLE
   type        : int
   default     : 1
   description : |-
     Controls whether NCCL transparently converts Broadcast collective operations
     into AllGatherV (variable-length AllGather) operations at enqueue time. When
     enabled (1, the default) and collective coalescing is not active, any
     Broadcast call is internally re-implemented as an AllGatherV, which can be
     more efficient on certain topologies by distributing the work across all ranks
     rather than having a single root send to all peers. The conversion
     reinterprets the count as bytes and routes the task through the broadcast
     queue scheduler instead of the standard collective sorter. Setting this to 0
     preserves the original Broadcast implementation.

 - name        : NCCL_SYM_CE_THRESHOLD
   type        : int
   default     : 8388608
   description : |-
     Sets the minimum data size threshold (in elements) above which AllGather
     operations are offloaded to the CUDA Copy Engine (CE) instead of using SM
     (Streaming Multiprocessor) kernels, on Blackwell-generation GPUs (compute
     capability >= 100) with direct NVLink connectivity and symmetric memory
     support. The default value is 8388608 (8 MB). Below this threshold, the
     standard SM-based collective kernel is used. The Copy Engine path is
     advantageous for large transfers because it frees up SM resources for
     computation while the data movement proceeds asynchronously via dedicated
     hardware copy engines. Increasing this value makes CE usage less aggressive;
     decreasing it allows CE offload for smaller transfers.

 - name        : NCCL_P2P_EPOCH_ENABLE
   type        : int
   default     : 1
   description : |-
     Controls whether P2P (point-to-point) operations are separated into distinct
     device work batches based on their epoch identifier. When enabled (1, the
     default), P2P operations with different epoch values are forced into separate
     work batches, ensuring that operations from different scheduling epochs are
     not fused together on the device. This enforces ordering and prevents
     potential hangs that could occur if operations from different logical phases
     were combined. When disabled (0), the epoch boundary is ignored during batch
     formation, allowing more aggressive batching at the risk of cross-epoch
     fusion. Other batch-splitting rules (max ops per batch, no duplicate rounds,
     same group constraint) remain in effect regardless.

 - name        : NCCL_NUM_RMA_CTX
   type        : int
   default     : -2147483648
   description : |-
     Controls the number of RMA (Remote Memory Access) contexts allocated per
     communicator. The default value of -2147483648 (INT_MIN) is a sentinel meaning
     "not configured," which resolves to 1 internally. Each RMA context corresponds
     to a task queue in the kernel planner, a Copy Engine context for GPU-initiated
     transfers, and a virtual RMA proxy context that maps round-robin to physical
     GIN communicator connections. Setting this to a higher value allows more
     concurrent RMA operations to be scheduled and executed in parallel across
     different contexts. Setting to 0 or a negative value (other than the sentinel)
     disables RMA functionality entirely. Must be positive and is overridable via
     the ncclConfig_t programmatic API.

 - name        : NCCL_GDAKI_USE_RELIABLE_DB
   type        : int
   default     : 0
   description : |-
     Controls the doorbell record (DBR) mode for GPU-Direct Async Kernel-Initiated
     (GDAKI) queue pair creation in the GIN InfiniBand transport. When set to 0
     (default), the standard valid doorbell mode (VALID_DBR) is used. When set to
     1, it attempts hardware-bypassed doorbell mode (NO_DBR_HW), falling back to
     software-emulated no-doorbell mode (NO_DBR_SW_EMULATED) if hardware support is
     unavailable. When set to 2, it enables a three-tier fallback: first hardware
     no-doorbell, then software-emulated no-doorbell, and finally the standard
     valid doorbell if neither works. This tunes the reliability and performance
     characteristics of GPU-initiated RDMA operations via DOCA GPUNetIO. Possible
     values: 0, 1, 2.

 - name        : NCCL_DISABLE_MEM_MANAGER
   type        : int
   default     : 1
   description : |-
     Controls NCCL baseline own memory manager. 0: enable, 1: disable

 - name        : NCCL_GIN_PLUGIN_REF_COUNT
   type        : int
   default     : 0
   description : |-
     Sets the initial reference count for GIN (GPU-Initiated Network) plugin shared
     libraries. Each communicator that uses a GIN plugin increments this counter on
     assignment and decrements it during finalization. The plugin's shared library
     is only unloaded (via dlclose) when the reference count reaches zero. By
     setting a non-zero initial value, the plugin library can be kept loaded in
     memory even after all communicators have finalized, which prevents expensive
     re-loading if new communicators will be created later. This is useful for
     long-running applications that create and destroy communicators repeatedly.

 - name        : NCCL_IB_DEVICE_PCI_ORDER
   type        : int
   default     : 1
   description : |-
     Controls whether InfiniBand devices are sorted by PCI bus address during
     initialization. When enabled (1, the default), after all IB devices are
     discovered, they are sorted by their full PCI path converted to an integer,
     ensuring deterministic and consistent device ordering across all nodes in the
     cluster regardless of the kernel's device enumeration order. This sorting
     occurs before assigning real port IDs and creating virtual devices. Disabling
     this (0) leaves devices in their kernel-discovered order, which may vary
     across nodes and lead to topology mismatches. Consistent ordering is important
     for correct rail-optimized network configurations.

 - name        : NCCL_IB_RECEIVER_SIDE_MATCHING_SCHEME
   type        : int
   default     : 0
   description : |-
     Selects how the IB transport matches incoming RDMA completions to outstanding
     receive requests. The default value 0 (BY_INDEX) uses the work request ID
     (wr_id) from the completion to index directly into the receive request array,
     while the immediate data field carries the message size. Setting it to 1
     (BY_ID) switches to an ID-based scheme where the sender embeds the request ID
     in the RDMA Write's immediate data, and the receiver uses that ID (modulo max
     requests) to look up the corresponding receive request. The ID-based scheme
     can be more resilient when receive work requests are not consumed in strict
     order, at the cost of losing inline size information in immediate data.
     Possible values: 0 (BY_INDEX), 1 (BY_ID).

 - name        : NCCL_IB_PREPOST_RECEIVE_WORK_REQUESTS
   type        : int
   default     : 0
   description : |-
     Controls whether IB receive work requests are pre-posted at connection time
     rather than posted on-demand during each receive operation. The default is 0
     (on-demand posting). When set to 1, during connection setup,
     NET_IB_MAX_REQUESTS receive work requests are pre-posted to each QP, and upon
     each completion a new receive work request is immediately re-posted to
     replenish the pool. This reduces latency on the receive path by eliminating
     the need to post a work request at receive time. When IB resiliency mode is
     active (NCCL_IB_RESILIENCY_PORT_FAILOVER != 0), pre-posting is forced on
     regardless of this setting, as it is required for correct error recovery.

 - name        : NCCL_GIN_PLUGIN
   type        : string
   default     : ""
   description : |-
     Specifies the shared library name(s) for external GIN (GPU-Initiated Network)
     plugins to load. Accepts a comma-separated list of shared library names (e.g.,
     "libcustom-gin.so,libfallback-gin.so"). If not set, the default plugin
     "libnccl-gin.so" is used. Setting it to "none" (case-insensitive) disables
     loading any external GIN plugin, leaving only the built-in internal IB GIN
     plugin available. Plugins are attempted in order: the first one that
     successfully loads, initializes, and finds devices is assigned to the
     communicator, and remaining plugins are disabled. The internal GIN IB plugin
     is always registered as a fallback regardless of this setting.

 - name        : NCCL_GIN_NCONNECTIONS
   type        : int
   default     : -2
   description : |-
     Overrides the number of GIN (GPU-Initiated Network) connections
     (communicators) established during GIN initialization. The default value of -2
     is a sentinel meaning "not set," in which case the connection count defaults
     to the number of local GIN-capable network devices detected by topology
     discovery. When set to any other integer value, it directly controls the GIN
     communicator count. The value is capped at NCCL_GIN_MAX_CONNECTIONS and then
     globally reduced to the minimum across all ranks via an AllGather, ensuring
     all ranks agree on the connection count. More connections can improve bandwidth
     by utilizing more NIC ports but consume more resources.

 - name        : NCCL_SYM_GIN_KERNELS_ENABLE
   type        : int
   default     : 1
   description : |-
     Controls whether GIN (Global Interconnect Network) symmetric kernels are
     enabled for multi-node collective operations. When enabled (1, the default),
     NCCL allocates GIN inbox, outbox, and rail signal resources during symmetric
     kernel initialization, and includes GIN kernel variants (such as
     ReduceScatter_RailA2A and AllGather_RailRing) in the kernel selection mask.
     GIN kernels are only relevant in multi-node scenarios where the LSA team size
     is smaller than the total communicator size. When disabled (0), all GIN kernel
     variants are masked out and their resources are not allocated, forcing fallback
     to LSA-only kernel variants.

 - name        : NCCL_IB_RESILIENCY_PORT_FAILOVER_PROBE_DELAY
   type        : int
   default     : 10
   description : |-
     Specifies the delay in milliseconds that NCCL waits after detecting an
     InfiniBand send error before posting an RDMA Read probe to check whether the
     failed request's data actually reached the remote side. If insufficient time
     has elapsed since the error, the probe is deferred. The default of 10
     milliseconds provides a brief settling period before attempting error recovery
     via the probe mechanism. This parameter is only meaningful when IB port
     failover resiliency is enabled (NCCL_IB_RESILIENCY_PORT_FAILOVER != 0).

 - name        : NCCL_IB_RESILIENCY_PORT_FAILOVER_MAX_ATTEMPTS
   type        : int
   default     : 1
   description : |-
     Sets the maximum number of RDMA Read probe attempts that NCCL will make for a
     single failed InfiniBand send request before giving up and declaring a fatal
     remote error (ncclRemoteError). Each failed send request tracks its own
     attempt counter, and when this counter exceeds the configured maximum, no
     further probes are posted and the error is propagated. With the default value
     of 1, NCCL attempts at most one probe per failed request before declaring the
     failure unrecoverable. Increasing this value allows more retry opportunities
     but may delay error detection. This parameter is only meaningful when IB port
     failover resiliency is enabled (NCCL_IB_RESILIENCY_PORT_FAILOVER != 0).

 - name        : NCCL_IB_RESILIENCY_PORT_FAILOVER
   type        : int
   default     : 0
   description : |-
     Master enable/disable switch for InfiniBand port failover resiliency in NCCL.
     When set to 0 (the default), no resiliency context is allocated and all IB
     error recovery and port failover logic is disabled. When set to any non-zero
     value, NCCL allocates resiliency contexts for both send and receive
     communicators, enabling runtime detection of IB errors (such as
     IBV_WC_WR_FLUSH_ERR and IBV_WC_RETRY_EXC_ERR), automatic QP replacement to
     failover from a failed IB device to a functional one, and RDMA Read probing
     to verify whether in-flight data reached the remote side. This is the gating
     flag for the entire IB resiliency subsystem; the PROBE_DELAY and MAX_ATTEMPTS
     parameters are only meaningful when this is enabled.

 - name        : NCCL_LSA_TEAM_SIZE
   type        : int
   default     : 0
   description : |-
     Sets the requested size of LSA (Local Symmetric Addressing) teams, which are
     groups of consecutive ranks that can communicate using fast intra-node
     symmetric memory operations. The value is combined with actual node sizes via
     GCD (greatest common divisor) operations to ensure the final team size evenly
     divides every node's rank count and represents a contiguous set of ranks. The
     default value of 0 causes the GCD computation to yield a natural team size
     matching the physical node topology (since gcd(0, n) = n). The computed team
     size determines how ranks are partitioned and directly affects which symmetric
     kernel variants are chosen: GIN kernels for multi-node communication (LSA team
     < total ranks) and LSA-only kernels for intra-team operations.

 - name        : NCCL_GIN_EXCLUSIVE_CONTEXTS
   type        : int
   default     : -1
   description : |-
     Controls whether GIN (GPU-Initiated Network) contexts are allocated in
     exclusive or shared mode during device communicator creation. The default
     value of -1 means "defer to the programmatic request" via the
     ncclDevCommRequirements structure. When set to 1 (exclusive mode), GIN
     contexts are allocated from a dedicated exclusive pool and the requested count
     must not exceed the number of unallocated exclusive contexts, or an
     ncclInvalidArgument error is returned. When set to 0 (shared mode), contexts
     are shared and capped to the available shared pool size. This environment
     variable acts as an override that takes precedence over any programmatic
     setting, allowing operators to force exclusive or shared GIN context
     allocation at the environment level.

 - name        : NCCL_CHECK_MODE
   type        : string
   default     : ""
   description : |-
     Controls the level of runtime argument and pointer validation performed by
     NCCL during collective operations. When unset (default), no extra validation
     is performed for maximum performance. Setting it to "DEBUG_LOCAL" enables local
     CUDA device pointer checks on all send/receive buffers before launching
     collectives, catching invalid or host-memory pointers early (replaces
     deprecated NCCL_CHECK_POINTERS). Setting it to "DEBUG_GLOBAL" enables all
     local checks plus global cross-rank consistency validation, where collective
     arguments are checked symmetrically across all ranks to detect mismatched
     buffer addresses, counts, or operation types. Possible values: ""
     (default/disabled), "DEBUG_LOCAL", "DEBUG_GLOBAL".

 - name        : NCCL_CTRAN_DA2A_LL128_BUFFER_SIZE
   type        : int64_t
   default     : 0
   description : |-
     Per-peer LL128 buffer size in bytes for DeviceAllToAllv. When set to 0
     (default), the buffer size is auto-computed from a 256KB default using
     ll128_buffer_size(256 * 1024). Override for workloads with known larger
     per-peer message sizes. Only takes effect when
     NCCL_CTRAN_DA2A_LL128_THRESHOLD is non-zero.

 - name        : NCCL_CTRAN_DA2A_LL128_THRESHOLD
   type        : int64_t
   default     : 0
   description : |-
     Per-peer byte threshold for LL128 protocol selection in DeviceAllToAllv.
     When non-zero, LL128 buffers are allocated at init time and the kernel
     uses LL128 for per-peer transfers <= this many bytes (and meeting 16-byte
     alignment), with Simple (send/recv) fallback for larger or misaligned
     transfers. When 0 (default), LL128 is disabled and only Simple protocol
     is used. Set to 262144 (256KB) to enable LL128 for typical workloads.
     LL128 uses 128-byte cache-line-atomic packets with inline flag signaling,
     providing better performance for small/medium messages. Requires per-peer
     byte counts (count * elementSize) to be multiples of 16.

# ============================================================================
# NCCL 2.30 new parameters
# ============================================================================

 - name        : NCCL_ELASTIC_BUFFER_REGISTER
   type        : int64_t
   default     : 1
   description : Enable elastic buffer registration (added in NCCL 2.30).

 - name        : NCCL_GIN_GDAKI_MAX_DEST_RD_ATOMIC
   type        : int64_t
   default     : -2
   description : Override max_dest_rd_atomic for GIN GDAKI QPs.

 - name        : NCCL_GIN_GDAKI_MAX_QP_RD_ATOMIC
   type        : int64_t
   default     : -2
   description : Override max_qp_rd_atomic for GIN GDAKI QPs.

 - name        : NCCL_IB_OOO_RQ
   type        : int64_t
   default     : 0
   description : Enable IB out-of-order receive queue (added in NCCL 2.30).

 - name        : NCCL_IB_RESILIENCY_PORT_RECOVERY
   type        : int64_t
   default     : 0
   description : Enable IB port recovery for resiliency (added in NCCL 2.30).

 - name        : NCCL_IB_RESILIENCY_PORT_RECOVERY_ACK_TIMEOUT
   type        : int64_t
   default     : 5000
   description : Ack timeout in ms for IB port recovery.

 - name        : NCCL_IB_RESILIENCY_PORT_RECOVERY_ALIVE_MSG_BATCH_INTERVAL
   type        : int64_t
   default     : 500
   description : Interval in ms between alive message batches during IB port recovery.

 - name        : NCCL_IB_RESILIENCY_PORT_RECOVERY_ALIVE_MSG_BATCH_SIZE
   type        : int64_t
   default     : 5
   description : Number of alive messages per batch during IB port recovery.

 - name        : NCCL_IB_RESILIENCY_PORT_RECOVERY_ALIVE_MSG_SEQUENCE_SIZE
   type        : int64_t
   default     : 5
   description : Number of alive message sequences during IB port recovery.

 - name        : NCCL_IB_RESILIENCY_PORT_RECOVERY_ALIVE_MSG_TIMEOUT
   type        : int64_t
   default     : 4000
   description : Timeout in ms for alive messages during IB port recovery.

 - name        : NCCL_IB_RESILIENCY_PORT_RECOVERY_ATTEMPTS_MAX
   type        : int64_t
   default     : 5
   description : Maximum recovery attempts for IB port recovery.

 - name        : NCCL_IB_RESILIENCY_PORT_RECOVERY_START_DELAY
   type        : int64_t
   default     : 200
   description : Delay in ms before starting IB port recovery.

 - name        : NCCL_IGNORE_COLLNET_MISMATCH
   type        : int64_t
   default     : 0
   description : Ignore CollNet capability mismatch across ranks (added in NCCL 2.30).

 - name        : NCCL_IGNORE_NET_MISMATCH
   type        : int64_t
   default     : 1
   description : Ignore net plugin mismatch across ranks (added in NCCL 2.30).

 - name        : NCCL_MNNVL_CROSS_CLIQUE
   type        : int64_t
   default     : 0
   description : Enable multi-NVLink cross-clique support (added in NCCL 2.30).

 - name        : NCCL_MULTI_RANK_GPU_ENABLE
   type        : int64_t
   default     : 0
   description : Enable multi-rank per GPU (added in NCCL 2.30).

 # Note: NCCL_NET_OPTIONAL_RECV_COMPLETION cannot be registered as a cvar
 # because it collides with #define NCCL_NET_OPTIONAL_RECV_COMPLETION 0x1
 # in nccl_net.h. The NCCL_PARAM in net.cc is replaced with a manual
 # ncclLoadParam call.

 - name        : NCCL_P2P_MAX_PEERS
   type        : int64_t
   default     : -1
   description : Maximum number of P2P peers (added in NCCL 2.30). Uses NCCL_CONFIG_UNDEF_INT as default.

 - name        : NCCLX_TUNER_CONFIG_FILE
   type        : string
   default     : ""
   description : |-
     Absolute path to a CSV or JSON file (.json extension -> JSON, otherwise
     CSV) that overrides NCCL core algorithm/protocol/chunkSize selection per
     (collective, message-size range, topology). When empty, the built-in
     tuner is disabled and NCCL's default cost-model selection is used.
     When set, this built-in tuner takes precedence over any external
     NCCL_TUNER_PLUGIN.

 - name        : NCCLX_TUNER_IGNORE_CONFIG_ERRORS
   type        : bool
   default     : false
   description : |-
     Controls how the built-in tuner reacts to a malformed NCCLX_TUNER_CONFIG_FILE.
     When false (default), any tuner config parse error (file cannot be opened,
     malformed JSON, missing/non-array "rules", an unknown collective/algorithm/
     protocol, an invalid interval, a present-but-invalid numeric, or a bad JSON
     value type) fails communicator initialization. When true, parse errors are
     logged and the offending rule is skipped (or the whole file is ignored) and
     init continues with the remaining valid rules. An empty/unset
     NCCLX_TUNER_CONFIG_FILE means the tuner is simply disabled and is never an
     error regardless of this setting.

 - name        : NCCLX_META_TUNER_LOG_MISMATCH
   type        : bool
   default     : false
   description : |-
     When true, the built-in meta tuner logs (at INFO, subsys TUNING) the reason
     a tuning rule did NOT match a collective -- which field disqualified it and
     the rule's expected value vs the actual value. Useful for debugging why a
     config rule is not taking effect. Default false (no mismatch logging).
