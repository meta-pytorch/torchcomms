Addition:
- Panel Config:
    id: 200
  metric_table:
    id: 201
    metrics:
    - MFMA FLOPs (F8):
        value: AVG(((SQ_INSTS_VALU_MFMA_MOPS_F8 * 512) / (End_Timestamp - Start_Timestamp)))
        unit: GFLOP/s
        peak: ((($max_sclk * $cu_per_gpu) * 8192) / 1000)
        pop: ((100 * AVG(((SQ_INSTS_VALU_MFMA_MOPS_F8 * 512) / (End_Timestamp - Start_Timestamp)))) / ((($max_sclk * $cu_per_gpu) * 8192) / 1000))
    - MFMA FLOPs (F6F4):
        value: AVG(((SQ_INSTS_VALU_MFMA_MOPS_F6F4 * 512) / (End_Timestamp - Start_Timestamp)))
        unit: GFLOP/s
        peak: ((($max_sclk * $cu_per_gpu) * 16834) / 1000)
        pop: ((100 * AVG(((SQ_INSTS_VALU_MFMA_MOPS_F6F4 * 512) / (End_Timestamp - Start_Timestamp)))) / ((($max_sclk * $cu_per_gpu) * 16834) / 1000))
- Panel Config:
    id: 200
  metric_descriptions:
    MFMA FLOPs (F8): The total number of 8-bit brain floating point MFMA operations executed per second. This does not include any 16-bit brain floating point operations from VALU instructions. This is also presented as a percent of the peak theoretical F8 MFMA operations achievable on the specific accelerator. It is supported on AMD Instinct MI300 series and later only.
- Panel Config:
    id: 400
  metric_table:
    id: 401
    metrics:
    - MFMA FLOPs (F8):
        value: AVG((((SQ_INSTS_VALU_MFMA_MOPS_F8 * 512)) / ((End_Timestamp - Start_Timestamp) / 1e9)) / 1e9)
        unit: GFLOP/s
        peak: $MFMAF8Flops_empirical_peak
    - MFMA FLOPs (F6F4):
        value: AVG((((SQ_INSTS_VALU_MFMA_MOPS_F6F4 * 512)) / ((End_Timestamp - Start_Timestamp) / 1e9)) / 1e9)
        unit: GFLOP/s
        peak: $MFMAF6F4Flops_empirical_peak
- Panel Config:
    id: 400
  metric_descriptions:
    MFMA FLOPs (F8): The total number of 8-bit brain floating point MFMA operations executed per second. This does not include any 16-bit brain floating point operations from VALU instructions. The peak empirically measured F8 MFMA operations achievable on the specific accelerator is displayed alongside for comparison. It is supported on AMD Instinct MI300 series and later only.
    MFMA FLOPs (F6F4): >-
      The total number of 4-bit and 6-bit floating point MFMA operations executed
      per second. Note: this does not include any floating point operations from
      VALU instructions. The peak empirically measured F6F4 MFMA operations
      achievable on the specific accelerator is displayed alongside for comparison.
      It is supported on AMD Instinct MI350 series (gfx950) and later only.
- Panel Config:
    id: 500
  metric_table:
    id: 502
    metrics:
    - CPC SYNC FIFO Full Rate:
        avg: AVG((100 * CPC_SYNC_FIFO_FULL) / CPC_SYNC_WRREQ_FIFO_BUSY if (CPC_SYNC_WRREQ_FIFO_BUSY != 0) else None)
        min: MIN((100 * CPC_SYNC_FIFO_FULL) / CPC_SYNC_WRREQ_FIFO_BUSY if (CPC_SYNC_WRREQ_FIFO_BUSY != 0) else None)
        max: MAX((100 * CPC_SYNC_FIFO_FULL) / CPC_SYNC_WRREQ_FIFO_BUSY if (CPC_SYNC_WRREQ_FIFO_BUSY != 0) else None)
        unit: pct
    - CPC CANE Stall Rate:
        avg: AVG((100 * CPC_CANE_STALL) / CPC_CANE_BUSY if (CPC_CANE_BUSY != 0) else None)
        min: MIN((100 * CPC_CANE_STALL) / CPC_CANE_BUSY if (CPC_CANE_BUSY != 0) else None)
        max: MAX((100 * CPC_CANE_STALL) / CPC_CANE_BUSY if (CPC_CANE_BUSY != 0) else None)
        unit: pct
    - CPC ADC Utilization:
        avg: AVG((100 * CPC_TG_SEND) / CPC_GD_BUSY if (CPC_GD_BUSY != 0) else None)
        min: MIN((100 * CPC_TG_SEND) / CPC_GD_BUSY if (CPC_GD_BUSY != 0) else None)
        max: MAX((100 * CPC_TG_SEND) / CPC_GD_BUSY if (CPC_GD_BUSY != 0) else None)
        unit: pct
