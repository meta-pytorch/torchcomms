- Panel Config:
    id: 1000
  metric_descriptions:
    VALU: The total number of vector arithmetic logic unit (VALU) operations issued. These are the workhorses of the compute unit, and are used to execute a wide range of instruction types including floating point operations, non-uniform address calculations, transcendental operations, integer operations, shifts, conditional evaluation, etc.
    VMEM: The total number of vector memory operations issued. These include most loads, stores and atomic operations and all accesses to generic, global, private and texture memory.
    MFMA: The total number of matrix fused multiply-add instructions issued.
    INT32: The total number of instructions operating on 32-bit integer operands issued to the VALU per normalization unit.
    INT64: The total number of instructions operating on 64-bit integer operands issued to the VALU per normalization unit.
    F16-ADD: The total number of addition instructions operating on 16-bit floating-point operands issued to the VALU per normalization unit.
    F16-MUL: The total number of multiplication instructions operating on 16-bit floating-point operands issued to the VALU per normalization unit.
    F16-FMA: The total number of fused multiply-add instructions operating on 16-bit floating-point operands issued to the VALU per normalization unit.
    F16-Trans: The total number of transcendental instructions (e.g., sqrt) operating on 16-bit floating-point operands issued to the VALU per normalization unit.
    F32-ADD: The total number of addition instructions operating on 32-bit floating-point operands issued to the VALU per normalization unit.
    F32-MUL: The total number of multiplication instructions operating on 32-bit floating-point operands issued to the VALU per normalization unit.
    F32-FMA: The total number of fused multiply-add instructions operating on 32-bit floating-point operands issued to the VALU per normalization unit.
    F32-Trans: The total number of transcendental instructions (such as sqrt) operating on 32-bit floating-point operands issued to the VALU per normalization unit.
    F64-ADD: The total number of addition instructions operating on 64-bit floating-point operands issued to the VALU per normalization unit.
    F64-MUL: The total number of multiplication instructions operating on 64-bit floating-point operands issued to the VALU per normalization unit.
    F64-FMA: The total number of fused multiply-add instructions operating on 64-bit floating-point operands issued to the VALU per normalization unit.
    F64-Trans: The total number of transcendental instructions (such as sqrt) operating on 64-bit floating-point operands issued to the VALU per normalization unit.
    Conversion: >-
      The total number of type conversion instructions (such as converting
      data to or from F32\u2194F64) issued to the VALU per normalization unit.
    MFMA-I8: The total number of 8-bit integer MFMA instructions issued per normalization unit.
    MFMA-F8: The total number of 8-bit floating point MFMA instructions issued per normalization unit. This is supported in AMD Instinct MI300 series and later only.
    MFMA-F16: The total number of 16-bit floating point MFMA instructions issued per normalization unit.
    MFMA-BF16: The total number of 16-bit brain floating point MFMA instructions issued per normalization unit.
    MFMA-F32: The total number of 32-bit floating-point MFMA instructions issued per normalization unit.
    MFMA-F64: The total number of 64-bit floating-point MFMA instructions issued per normalization unit.
