- Panel Config:
    id: 1100
  metric_descriptions:
    VALU FLOPs: >-
      The total floating-point operations executed per second on the VALU.
      This is also presented as a percent of the peak theoretical FLOPs achievable
      on the specific accelerator. Note: this does not include any floating-point
      operations from MFMA instructions.
    VALU IOPs: >-
      The total integer operations executed per second on the VALU. This is
      also presented as a percent of the peak theoretical IOPs achievable on the
      specific accelerator. Note: this does not include any integer operations from
      MFMA instructions.
    MFMA FLOPs (BF16): >-
      The total number of 16-bit brain floating point MFMA operations executed
      per second. Note: this does not include any 16-bit brain floating point operations
      from VALU instructions. This is also presented as a percent of the peak theoretical
      BF16 MFMA operations achievable on the specific accelerator.
    MFMA FLOPs (F16): >-
      The total number of 16-bit floating point MFMA operations executed per
      second. Note: this does not include any 16-bit floating point operations from
      VALU instructions. This is also presented as a percent of the peak theoretical
      F16 MFMA operations achievable on the specific accelerator.
    MFMA FLOPs (F32): >-
      The total number of 32-bit floating point MFMA operations executed per
      second. Note: this does not include any 32-bit floating point operations from
      VALU instructions. This is also presented as a percent of the peak theoretical
      F32 MFMA operations achievable on the specific accelerator.
    MFMA FLOPs (F64): >-
      The total number of 64-bit floating point MFMA operations executed per
      second. Note: this does not include any 64-bit floating point operations from
      VALU instructions. This is also presented as a percent of the peak theoretical
      F64 MFMA operations achievable on the specific accelerator.
    MFMA IOPs (INT8): >-
      The total number of 8-bit integer MFMA operations executed per second.
      Note: this does not include any 8-bit integer operations from VALU instructions.
      This is also presented as a percent of the peak theoretical INT8 MFMA operations
      achievable on the specific accelerator.
    Dual-issue VALU Utilization: Indicates what percent of the kernel's duration the VALU was busy executing dual-issued instructions. Computed as the ratio of the total number of cycles spent by the scheduler co-issuing VALU instructions over the total CU cycles.
    VMEM Utilization: Indicates what percent of the kernel's duration the VMEM unit was busy executing instructions, including both global/generic and spill/scratch operations (see the VMEM instruction count metrics for more detail). Does not include VALU operations. Computed as the ratio of the total number of cycles spent by the scheduler issuing VMEM instructions over the total CU cycles.
    Branch Utilization: Indicates what percent of the kernel's duration the branch unit was busy executing instructions. Computed as the ratio of the total number of cycles spent by the scheduler issuing branch instructions over the total CU cycles.
    MFMA Utilization: Indicates what percent of the kernel's duration the MFMA unit was busy executing instructions. Computed as the ratio of the total number of cycles spent by the MFMA was busy over the total CU cycles.
    MFMA Instruction Cycles: The average duration of MFMA instructions in this kernel in cycles. Computed as the ratio of the total number of cycles the MFMA unit was busy over the total number of MFMA instructions.
    VMEM Latency: The average number of round-trip cycles (that is, from issue to data return / acknowledgment) required for a VMEM instruction to complete.
    SMEM Latency: The average number of round-trip cycles (that is, from issue to data return / acknowledgment) required for a SMEM instruction to complete.
    FLOPs (Total): The total number of floating-point operations executed on either the VALU or MFMA units, per normalization unit.
    IOPs (Total): The total number of integer operations executed on either the VALU or MFMA units, per normalization unit.
    F16 OPs: The total number of 16-bit floating-point operations executed on either the VALU or MFMA units, per normalization unit.
    BF16 OPs: The total number of 16-bit brain floating-point operations executed on either the VALU or MFMA units, per normalization unit.
    F32 OPs: The total number of 32-bit floating-point operations executed on either the VALU or MFMA units, per normalization unit.
    F64 OPs: The total number of 64-bit floating-point operations executed on either the VALU or MFMA units, per normalization unit.
    INT8 OPs: The total number of 8-bit integer operations executed on either the VALU or MFMA units, per normalization unit.
