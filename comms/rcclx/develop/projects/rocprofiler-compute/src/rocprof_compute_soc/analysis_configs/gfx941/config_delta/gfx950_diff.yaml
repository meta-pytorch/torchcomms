        max: MAX((100 * SQ_ACTIVE_INST_VALU2) / (SQ_ACTIVE_INST_VALU - SQ_ACTIVE_INST_VALU2))
        unit: pct
- Panel Config:
    id: 1100
  metric_table:
    id: 1103
    metrics:
    - F6F4 OPs:
        avg: AVG((512 * SQ_INSTS_VALU_MFMA_MOPS_F6F4) / $denom)
        min: MIN((512 * SQ_INSTS_VALU_MFMA_MOPS_F6F4) / $denom)
        max: MAX((512 * SQ_INSTS_VALU_MFMA_MOPS_F6F4) / $denom)
        unit: (OPs + $normUnit)
- Panel Config:
    id: 1100
  metric_descriptions:
    Dual-issue VALU Utilization: Indicates what percent of the kernel's duration the VALU was busy executing dual-issued instructions. Computed as the ratio of the total number of cycles spent by the scheduler co-issuing VALU instructions over the total CU cycles.
