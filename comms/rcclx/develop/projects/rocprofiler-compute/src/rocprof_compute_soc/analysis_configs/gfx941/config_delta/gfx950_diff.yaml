- Panel Config:
    id: 1700
  metric_descriptions:
    Read Bandwidth: Total number of bytes looked up in the L2 cache for read requests, divided by total duration.
    Write Bandwidth: Total number of bytes looked up in the L2 cache for write requests, divided by total duration.
    Atomic Bandwidth: Total number of bytes looked up in the L2 cache for atomic requests, divided by total duration.
    Read Bandwidth - PCIe: Total number of bytes due to L2 read requests due to PCIe traffic, divided by total duration.
    "Read Bandwidth - Infinity Fabric™": Total number of bytes due to L2 read requests due to Infinity Fabric traffic, divided by total duration.
    Read Bandwidth - HBM: Total number of bytes due to L2 read requests due to HBM traffic, divided by total duration.
    Write Bandwidth - PCIe: Total number of bytes due to L2 write requests due to PCIe traffic, divided by total duration.
    "Write Bandwidth - Infinity Fabric™": Total number of bytes due to L2 write requests due to Infinity Fabric traffic, divided by total duration.
    Write Bandwidth - HBM: Total number of bytes due to L2 write requests due to HBM traffic, divided by total duration.
    Atomic Bandwidth - PCIe: Total number of bytes due to L2 atomic requests due to PCIe traffic, divided by total duration.
    "Atomic Bandwidth - Infinity Fabric™": Total number of bytes due to L2 atomic requests due to Infinity Fabric traffic, divided by total duration.
    Atomic Bandwidth - HBM: Total number of bytes due to L2 atomic requests due to HBM traffic, divided by total duration.
    Read Stall: >-
      The ratio of the total number of cycles the L2-Fabric interface was
      stalled on a read request to any destination (local HBM, remote PCIe\xAE
      connected accelerator or CPU, or remote Infinity Fabric connected accelerator
      or CPU) over the total active L2 cycles.
    Write Stall: The ratio of the total number of cycles the L2-Fabric interface was stalled on a write or atomic request to any destination (local HBM, remote accelerator or CPU, PCIe connected accelerator or CPU, or remote Infinity Fabric connected accelerator or CPU) over the total active L2 cycles.
    Read - PCIe Stall: The number of cycles the L2-Fabric interface was stalled on read requests to remote PCIe connected accelerators or CPUs as a percent of the total active L2 cycles.
    Read - Infinity Fabric Stall: The number of cycles the L2-Fabric interface was stalled on read requests to remote Infinity Fabric connected accelerators or CPUs as a percent of the total active L2 cycles.
    Read - HBM Stall: The number of cycles the L2-Fabric interface was stalled on read requests to the accelerator's local HBM as a percent of the total active L2 cycles.
    Write - PCIe Stall: The number of cycles the L2-Fabric interface was stalled on write or atomic requests to remote PCIe connected accelerators or CPUs as a percent of the total active L2 cycles.
    Write - Infinity Fabric Stall: The number of cycles the L2-Fabric interface was stalled on write or atomic requests to remote Infinity Fabric connected accelerators or CPUs as a percent of the total active L2 cycles.
    Write - HBM Stall: The number of cycles the L2-Fabric interface was stalled on write or atomic requests to accelerator's local HBM as a percent of the total active L2 cycles.
