name: xpu-test

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:

permissions:
  id-token: write
  contents: read

concurrency:
  group: xpu_ci_test-${{ github.workflow }}-${{ github.ref == 'refs/heads/main' && github.run_number || github.ref }}
  cancel-in-progress: true

jobs:
  test:
    # Don't run on forked repos or empty test matrix
    if: github.repository_owner == 'meta-pytorch'
    timeout-minutes: 120
    runs-on: linux.idc.xpu.dist
    env:
      DOCKER_IMAGE: intelgpu/ubuntu-24.04-lts2:2523.40
    steps:
      - name: Checkout Torchcomms
        uses: actions/checkout@v4
        with:
          path: torchcomms

      - name: Clean all stopped docker containers
        if: always()
        shell: bash
        run: |
          # Prune all stopped containers.
          # If other runner is pruning on this node, will skip.
          nprune=$(ps -ef | grep -c "docker container prune")
          if [[ $nprune -eq 1 ]]; then
            docker container prune -f
          fi

      - name: Runner health check xpu-smi
        if: always()
        shell: bash
        run: |
          echo "ZE_AFFINITY_MASK=${ZE_AFFINITY_MASK}" >> $GITHUB_ENV
          timeout 30 xpu-smi discovery || true
          xpu-smi topology -m

      - name: Runner health check GPU count
        if: always()
        shell: bash
        run: |
          ngpu=$(timeout 30 clinfo -l | grep -c -E 'Device' || true)
          msg="Please file an issue on meta-pytorch/torchcomms reporting the faulty runner. Include a link to the runner logs so the runner can be identified"
          if [[ $ngpu -eq 0 ]]; then
            echo "Error: Failed to detect any GPUs on the runner"
            echo "$msg"
            exit 1
          fi

      - name: Runner diskspace health check
        uses: pytorch/pytorch/.github/actions/diskspace-cleanup@main
        if: always()

      - name: Preserve github env variables for use in docker
        shell: bash
        run: |
          env | grep '^GITHUB' >> "/tmp/github_env_${GITHUB_RUN_ID}"
          env | grep '^CI' >> "/tmp/github_env_${GITHUB_RUN_ID}"

      - name: XPU set GPU_FLAG
        shell: bash
        run: |
          # Add render group for container creation.
          render_gid=`cat /etc/group | grep render | cut -d: -f3`
          echo "GPU_FLAG=--device=/dev/mem --device=/dev/dri --group-add video --group-add $render_gid" >> "${GITHUB_ENV}"

      - name: Get docker image
        run: |
          docker pull "${{ env.DOCKER_IMAGE }}"

      - name: Test
        id: test
        env:
          TEST_COMMAND: torchcomms/.github/scripts/xpu_test.sh
          DOCKER_IMAGE: ${{ env.DOCKER_IMAGE }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_WORKFLOW: ${{ github.workflow }}
          GITHUB_JOB: ${{ github.job }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_RUN_NUMBER: ${{ github.run_number }}
          GITHUB_RUN_ATTEMPT: ${{ github.run_attempt }}
          SHA1: ${{ github.event.pull_request.head.sha || github.sha }}
          RUNNER_NAME: ${{ runner.name }}
          ZE_AFFINITY_MASK: ${{ env.ZE_AFFINITY_MASK }}
        timeout-minutes: 120
        run: |
          set -x

          #Install Intel Deep Learning Essentials
          DLE_VER=2025.3.2.36
          DLE_ROOT=/tmp/${RUNNER_NAME}/dle-${DLE_VER}
          DLE_PATH=${DLE_ROOT}/dle
          if [[ ! -d ${DLE_ROOT} ]]; then
            mkdir -p ${DLE_ROOT}
            DLE_URL="https://registrationcenter-download.intel.com/akdlm/IRC_NAS/b3e6c1bf-a6d5-4580-8b1d-80cbfd38c8af/intel-deep-learning-essentials-${DLE_VER}_offline.sh"
            wget -qO ${DLE_ROOT}/intel-deep-learning-essentials.sh ${DLE_URL}
            chmod +x ${DLE_ROOT}/intel-deep-learning-essentials.sh
            ${DLE_ROOT}/intel-deep-learning-essentials.sh -a --silent --eula accept --install-dir ${DLE_PATH} --instance=custom-id-${GITHUB_RUN_NUMBER}
            rm -f ${DLE_ROOT}/intel-deep-learning-essentials.sh
          fi
          
          # detached container should get cleaned up by teardown_ec2_linux
          # Used for GPU_FLAG since that doesn't play nice
          # shellcheck disable=SC2086,SC2090
          container_name=$(docker run \
            ${GPU_FLAG:-} \
            -e PR_NUMBER \
            -e GITHUB_ACTIONS \
            -e GITHUB_REPOSITORY \
            -e GITHUB_WORKFLOW \
            -e GITHUB_JOB \
            -e GITHUB_RUN_ID \
            -e GITHUB_RUN_NUMBER \
            -e GITHUB_RUN_ATTEMPT \
            -e ZE_AFFINITY_MASK \
            -e JOB_ID \
            -e BRANCH \
            -e SHA1 \
            -e RUNNER_NAME \
            -e DLE_PATH=${DLE_PATH} \
            --ulimit stack=10485760:83886080 \
            --ulimit core=0 \
            --security-opt seccomp=unconfined \
            --cap-add=SYS_PTRACE \
            --shm-size="8g" \
            --tty \
            --detach \
            --privileged \
            -v "${GITHUB_WORKSPACE}:/var/lib/jenkins/workspace" \
            -v "${DLE_PATH}:${DLE_PATH}" \
            -w /var/lib/jenkins/workspace \
            "${DOCKER_IMAGE}"
          )
          # save container name for later step
          echo "CONTAINER_NAME=${container_name}" >> "$GITHUB_ENV"
          docker exec -t "${container_name}" sh -c "bash ${TEST_COMMAND}"

      - name: Stop container before exit
        if: always()
        run: |
          # Workaround for multiple runners on same IDC node
          docker stop "${{ env.CONTAINER_NAME }}"

      - name: Teardown XPU
        if: always()
        shell: bash
        run: |
          # Prune all stopped containers.
          # If other runner is pruning on this node, will skip.
          nprune=$(ps -ef | grep -c "docker container prune")
          if [[ $nprune -eq 1 ]]; then
            docker container prune -f
          fi
      
      - name: Cleanup workspace
        if: always()
        run: sudo rm -rf ${{ github.workspace }}/*
