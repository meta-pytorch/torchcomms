name: Build Linux Wheels

on:
  pull_request:
  push:
    branches:
      - main
      - nightly
      - release/*
    tags:
        # NOTE: Binary build pipelines should only get triggered on release candidate builds
        # Release candidate tags look like: v1.11.0-rc1
        - v[0-9]+.[0-9]+.[0-9]+-rc[0-9]+
  workflow_dispatch:

jobs:
  generate-matrix:
    uses: pytorch/test-infra/.github/workflows/generate_binary_build_matrix.yml@main
    with:
      package-type: wheel
      os: linux
      test-infra-repository: pytorch/test-infra
      test-infra-ref: main
      with-cuda: enable
      with-rocm: enable
      with-cpu: disable

  configure-matrix:
    needs: generate-matrix
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-runners.outputs.matrix }}
    steps:
      - id: set-runners
        env:
          MATRIX: ${{ needs.generate-matrix.outputs.matrix }}
        run: |
          patched=$(python3 - <<'PY'
          import json, os
          runners = {
              "cuda": "linux.g5.12xlarge.nvidia.gpu",
          }
          matrix = json.loads(os.environ["MATRIX"])
          for entry in matrix["include"]:
              runner = runners.get(entry.get("gpu_arch_type"))
              if runner:
                  entry["validation_runner"] = runner
          print(json.dumps(matrix))
          PY
          )
          echo "matrix=${patched}" >> "$GITHUB_OUTPUT"

  build:
    needs: configure-matrix
    name: ${{ matrix.repository }}
    uses: pytorch/test-infra/.github/workflows/build_wheels_linux.yml@main
    with:
      repository: meta-pytorch/torchcomms
      ref: ""
      pre-script: ""
      post-script: ""
      build-platform: "python-build-package"
      build-command: "scripts/_build_wheel.sh"
      smoke-test-script: "scripts/smoke_test.py"
      package-name: torchcomms
      test-infra-repository: pytorch/test-infra
      test-infra-ref: main
      build-matrix: ${{ needs.configure-matrix.outputs.matrix }}
      trigger-event: ${{ github.event_name }}
